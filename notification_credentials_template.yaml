# OpenClaw 通知凭据配置文件模板
# 重要：将此文件复制为 notification_credentials.yaml 并填写实际凭据
# 建议将 notification_credentials.yaml 添加到 .gitignore 避免泄露敏感信息

# 邮件通知配置（Gmail示例）
email:
  # Gmail SMTP服务器配置
  smtp_server: "smtp.gmail.com"
  smtp_port: 587
  # 注意：对于Gmail，可能需要使用应用专用密码而非账户密码
  # 或者在支持的情况下使用OAuth2.0
  username: "your-email@gmail.com"  # 需要填写
  password: "your-app-specific-password"  # 需要填写
  from_email: "your-email@gmail.com"  # 需要填写
  to_emails:
    - "recipient1@example.com"  # 主要收件人
    - "recipient2@example.com"  # 备用收件人
  enable_tls: true

  # 邮件内容配置
  subject_prefix: "[OpenClaw Alert] "
  alert_level_colors:
    critical: "#FF0000"
    warning: "#FFA500"
    info: "#0000FF"

  # 发送频率控制
  min_alert_interval_minutes: 5  # 相同告警最小发送间隔
  max_alerts_per_hour: 20  # 每小时最大告警数

# Slack通知配置
slack:
  # Slack Incoming Webhook URL
  # 获取方式：Slack应用 -> Incoming Webhooks -> 创建Webhook
  webhook_url: "https://hooks.slack.com/services/XXXXXXXXX/XXXXXXXXX/XXXXXXXXXXXXXXXXXXXXXXXX"  # 需要填写

  # 频道和外观配置
  channel: "#alerts"  # 默认发送到哪个频道
  username: "OpenClaw Monitor"
  icon_emoji: ":warning:"

  # 消息格式化
  include_system_metrics: true
  include_queue_details: true
  include_suggested_actions: true

  # 发送控制
  min_alert_interval_minutes: 10  # Slack通知间隔可以长一些
  suppress_info_level: false  # 是否抑制info级别通知

# 通知策略配置
notification_strategy:
  # 告警级别映射
  send_email_for:
    - critical
    - warning
    - info  # 可选

  send_slack_for:
    - critical
    - warning

  # 工作时间控制（24小时制）
  working_hours:
    start: 9  # 早上9点
    end: 18   # 晚上6点

  # 非工作时间通知策略
  after_hours_notifications:
    enabled: true
    only_critical: true  # 非工作时间只发送严重告警
    slack_only: true     # 非工作时间只使用Slack

  # 节假日静默（如果实现日历集成）
  holiday_silence:
    enabled: false

# 测试配置
test_mode:
  enabled: false
  send_test_on_startup: false
  test_recipient: "test@example.com"
  test_slack_channel: "#test-alerts"

# 日志和审计配置
logging:
  log_all_notifications: true
  log_file_path: ".openclaw/notification_logs/"
  retention_days: 30

  # 敏感信息脱敏
  redact_sensitive: true
  redacted_fields:
    - password
    - webhook_url
    - api_key

# 备用通知渠道配置（预留）
backup_channels:
  sms:
    enabled: false
    provider: ""  # Twilio, AWS SNS等
    api_key: ""
    phone_numbers: []

  webhook:
    enabled: false
    webhook_urls: []

  # 可以添加更多通知渠道，如Teams、Discord等