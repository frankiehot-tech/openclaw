# GitLab CI/CD配置文件模板 - Java项目
# 支持Maven/Gradle、多阶段管道、容器化部署

# 定义工作流规则
workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"
      when: always
    - if: $CI_COMMIT_TAG
      when: always
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always
    - when: never

# 定义全局变量
variables:
  MAVEN_VERSION: "3.9"
  JAVA_VERSION: "17"
  GRADLE_VERSION: "8.5"
  DOCKER_IMAGE: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
  TEST_REPORTS_DIR: "test-results"
  COVERAGE_REPORTS_DIR: "coverage-reports"

  # Maven配置
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=WARN -Dorg.slf4j.simpleLogger.showDateTime=true -Djava.awt.headless=true"
  MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end --show-version -DinstallAtEnd=true -DdeployAtEnd=true"

# 全局缓存配置
cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .m2/repository/
    - .gradle/caches/
    - .gradle/wrapper/
  policy: pull-push

# 定义管道阶段
stages:
  - build
  - test
  - quality
  - security
  - package
  - deploy

# 第一阶段: 构建
detect-build-tool:
  stage: build
  image: alpine:latest
  script:
    - echo "检测构建工具..."
    # 检测使用Maven还是Gradle
    - |
      if [ -f "pom.xml" ]; then
        echo "检测到Maven项目"
        echo "MAVEN_PROJECT=true" >> build.env
      elif [ -f "build.gradle" ] || [ -f "build.gradle.kts" ]; then
        echo "检测到Gradle项目"
        echo "GRADLE_PROJECT=true" >> build.env
      else
        echo "未检测到构建配置文件"
        exit 1
      fi
  artifacts:
    reports:
      dotenv: build.env
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"

build-maven:
  stage: build
  image: maven:$MAVEN_VERSION-openjdk-$JAVA_VERSION
  dependencies:
    - detect-build-tool
  before_script:
    - java --version
    - mvn --version
  script:
    - echo "使用Maven构建项目..."
    - mvn $MAVEN_CLI_OPTS clean compile
  artifacts:
    paths:
      - target/classes/
    expire_in: 1 hour
  rules:
    - if: $MAVEN_PROJECT == "true"

build-gradle:
  stage: build
  image: gradle:$GRADLE_VERSION-jdk$JAVA_VERSION
  dependencies:
    - detect-build-tool
  before_script:
    - java --version
    - gradle --version
  script:
    - echo "使用Gradle构建项目..."
    - gradle clean classes --no-daemon
  artifacts:
    paths:
      - build/classes/
    expire_in: 1 hour
  rules:
    - if: $GRADLE_PROJECT == "true"

# 第二阶段: 测试
test-maven:
  stage: test
  image: maven:$MAVEN_VERSION-openjdk-$JAVA_VERSION
  dependencies:
    - build-maven
  script:
    - echo "运行Maven测试..."
    - mvn $MAVEN_CLI_OPTS test
  artifacts:
    reports:
      junit:
        - target/surefire-reports/TEST-*.xml
        - target/failsafe-reports/TEST-*.xml
    paths:
      - target/surefire-reports/
      - target/failsafe-reports/
    when: always
    expire_in: 1 week
  coverage: '/<coverage.*?line-rate="([\d\.]+)"/'
  rules:
    - if: $MAVEN_PROJECT == "true"

test-gradle:
  stage: test
  image: gradle:$GRADLE_VERSION-jdk$JAVA_VERSION
  dependencies:
    - build-gradle
  script:
    - echo "运行Gradle测试..."
    - gradle test --no-daemon
  artifacts:
    reports:
      junit:
        - build/test-results/test/TEST-*.xml
    paths:
      - build/reports/tests/
    when: always
    expire_in: 1 week
  coverage: '/<counter type="LINE".*?missed="\d+".*?covered="(\d+)".*?\/>/'
  rules:
    - if: $GRADLE_PROJECT == "true"

# 集成测试
integration-test:
  stage: test
  image: maven:$MAVEN_VERSION-openjdk-$JAVA_VERSION
  services:
    - postgres:14-alpine
    - redis:7-alpine
  variables:
    POSTGRES_DB: test_db
    POSTGRES_USER: test_user
    POSTGRES_PASSWORD: test_password
    REDIS_URL: redis://redis:6379
    SPRING_PROFILES_ACTIVE: "test"
  dependencies:
    - test-maven
    - test-gradle
  script:
    - echo "运行集成测试..."
    # Maven集成测试
    - |
      if [ "$MAVEN_PROJECT" = "true" ]; then
        mvn $MAVEN_CLI_OPTS verify -DskipITs=false
      elif [ "$GRADLE_PROJECT" = "true" ]; then
        gradle integrationTest --no-daemon
      fi
  artifacts:
    reports:
      junit:
        - target/failsafe-reports/TEST-*.xml
        - build/test-results/integrationTest/TEST-*.xml
    paths:
      - target/failsafe-reports/
      - build/reports/integrationTest/
    when: always
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"

# 第三阶段: 代码质量
code-quality:
  stage: quality
  image: maven:$MAVEN_VERSION-openjdk-$JAVA_VERSION
  dependencies:
    - test-maven
    - test-gradle
  script:
    - echo "运行代码质量检查..."
    # 检测和运行代码质量工具
    - |
      if [ "$MAVEN_PROJECT" = "true" ]; then
        # Checkstyle
        mvn $MAVEN_CLI_OPTS checkstyle:check || true
        # PMD
        mvn $MAVEN_CLI_OPTS pmd:check || true
        # SpotBugs
        mvn $MAVEN_CLI_OPTS spotbugs:check || true
        # JaCoCo代码覆盖率
        mvn $MAVEN_CLI_OPTS jacoco:report
      elif [ "$GRADLE_PROJECT" = "true" ]; then
        gradle check --no-daemon || true
        gradle jacocoTestReport --no-daemon
      fi
  artifacts:
    reports:
      codequality:
        - target/checkstyle-result.xml
        - target/pmd.xml
        - target/spotbugs.xml
      coverage_report:
        coverage_format: cobertura
        path: target/site/jacoco/jacoco.xml
    paths:
      - target/site/
      - build/reports/
    when: always
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"

# 第四阶段: 安全扫描
security-scan:
  stage: security
  image: maven:$MAVEN_VERSION-openjdk-$JAVA_VERSION
  dependencies: []
  script:
    - echo "运行安全扫描..."
    # OWASP依赖检查
    - |
      if [ "$MAVEN_PROJECT" = "true" ]; then
        mvn $MAVEN_CLI_OPTS org.owasp:dependency-check-maven:check -Dformat=XML -Dout=target/dependency-check-report.xml || true
      elif [ "$GRADLE_PROJECT" = "true" ]; then
        gradle dependencyCheckAnalyze --no-daemon || true
      fi
    # Snyk安全扫描
    - |
      if [ -n "$SNYK_TOKEN" ]; then
        npx snyk test --json > snyk-report.json || true
      else
        echo "SNYK_TOKEN未设置，跳过Snyk扫描"
      fi
  artifacts:
    reports:
      sast:
        - gl-sast-report.json
    paths:
      - target/dependency-check-report.xml
      - snyk-report.json
    when: always
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# 第五阶段: 打包
package-maven:
  stage: package
  image: maven:$MAVEN_VERSION-openjdk-$JAVA_VERSION
  dependencies:
    - code-quality
    - security-scan
  script:
    - echo "使用Maven打包..."
    - mvn $MAVEN_CLI_OPTS clean package -DskipTests
  artifacts:
    paths:
      - target/*.jar
      - target/*.war
    expire_in: 1 month
  rules:
    - if: $MAVEN_PROJECT == "true"
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_TAG

package-gradle:
  stage: package
  image: gradle:$GRADLE_VERSION-jdk$JAVA_VERSION
  dependencies:
    - code-quality
    - security-scan
  script:
    - echo "使用Gradle打包..."
    - gradle clean bootJar --no-daemon
  artifacts:
    paths:
      - build/libs/*.jar
    expire_in: 1 month
  rules:
    - if: $GRADLE_PROJECT == "true"
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_TAG

# Docker镜像构建
build-docker:
  stage: package
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  dependencies:
    - package-maven
    - package-gradle
  before_script:
    - docker info
  script:
    - echo "构建Docker镜像..."
    - docker build -t $DOCKER_IMAGE .
    - docker push $DOCKER_IMAGE
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
  only:
    variables:
      - $BUILD_DOCKER == "true"

# 第六阶段: 部署
deploy-staging:
  stage: deploy
  image: alpine:latest
  environment:
    name: staging
    url: https://staging.example.com
  dependencies:
    - package-maven
    - package-gradle
  before_script:
    - apk add --no-cache curl
  script:
    - echo "部署到预生产环境..."
    # 这里添加实际的部署命令
    # 例如: 部署到Kubernetes、云平台等
    - |
      if [ -f "deployment.yaml" ] && [ -n "$KUBE_CONFIG_STAGING" ]; then
        echo "$KUBE_CONFIG_STAGING" > kubeconfig.yaml
        export KUBECONFIG=kubeconfig.yaml
        kubectl apply -f deployment.yaml -n staging
        kubectl rollout status deployment/app -n staging
      else
        echo "未配置Kubernetes部署"
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
      when: manual

deploy-production:
  stage: deploy
  image: alpine:latest
  environment:
    name: production
    url: https://example.com
  dependencies:
    - deploy-staging
  before_script:
    - apk add --no-cache curl kubectl
  script:
    - echo "部署到生产环境..."
    # 蓝绿部署示例
    - |
      if [ -f "deployment.yaml" ] && [ -n "$KUBE_CONFIG_PRODUCTION" ]; then
        echo "$KUBE_CONFIG_PRODUCTION" > kubeconfig.yaml
        export KUBECONFIG=kubeconfig.yaml

        # 创建新部署 (绿色环境)
        sed "s|name: app-deployment|name: app-deployment-green|g" deployment.yaml > deployment-green.yaml
        sed -i "s|image:.*|image: $DOCKER_IMAGE|g" deployment-green.yaml

        kubectl apply -f deployment-green.yaml -n production
        kubectl rollout status deployment/app-deployment-green -n production

        # 切换服务流量
        kubectl patch service app-service -n production -p '{"spec":{"selector":{"deployment":"green"}}}'
        sleep 30

        # 清理旧部署
        kubectl delete deployment app-deployment -n production || true
      else
        echo "未配置Kubernetes部署"
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
    - if: $CI_COMMIT_TAG
      when: manual

# SonarQube分析 (可选)
sonarqube-analysis:
  stage: deploy
  image: maven:$MAVEN_VERSION-openjdk-$JAVA_VERSION
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
  dependencies:
    - code-quality
  script:
    - echo "运行SonarQube分析..."
    - |
      if [ -n "$SONAR_TOKEN" ]; then
        if [ "$MAVEN_PROJECT" = "true" ]; then
          mvn $MAVEN_CLI_OPTS sonar:sonar -Dsonar.projectKey=$CI_PROJECT_NAME -Dsonar.host.url=$SONAR_HOST_URL -Dsonar.login=$SONAR_TOKEN
        elif [ "$GRADLE_PROJECT" = "true" ]; then
          gradle sonarqube -Dsonar.projectKey=$CI_PROJECT_NAME -Dsonar.host.url=$SONAR_HOST_URL -Dsonar.login=$SONAR_TOKEN --no-daemon
        fi
      else
        echo "SONAR_TOKEN未设置，跳过SonarQube分析"
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual

# 清理阶段
cleanup:
  stage: .post
  image: alpine:latest
  script:
    - echo "清理临时文件..."
    - rm -rf target/ build/ .m2/ .gradle/ test-results/
  when: always
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"

# 集成GitLab安全模板
include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Dependency-Scanning.gitlab-ci.yml
  - template: Security/Container-Scanning.gitlab-ci.yml
  - template: Performance/Browser-Performance-Testing.gitlab-ci.yml

# 质量门禁
quality_gates:
  test_coverage:
    minimum: 70
  security_vulnerabilities:
    maximum: 0
  code_smells:
    maximum: 50

# 性能优化配置
cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - .m2/repository/
    - .gradle/caches/
    - .gradle/wrapper/
  policy: pull-push