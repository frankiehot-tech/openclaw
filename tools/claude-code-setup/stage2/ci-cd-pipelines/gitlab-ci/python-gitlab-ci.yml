# GitLab CI/CD配置文件模板 - Python项目
# 支持多阶段管道、缓存优化、容器注册表集成

# 定义工作流规则
workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"
      when: always
    - if: $CI_COMMIT_TAG
      when: always
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always
    - when: never

# 定义全局变量
variables:
  PYTHON_VERSION: "3.11"
  POETRY_VERSION: "1.7.1"
  DOCKER_IMAGE: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
  TEST_REPORTS_DIR: "test-results"
  COVERAGE_REPORTS_DIR: "coverage-reports"

# 全局缓存配置
cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .cache/pip
    - venv/
  policy: pull-push

# 定义管道阶段
stages:
  - lint
  - test
  - build
  - security
  - deploy

# 第一阶段: 代码质量检查
lint-python:
  stage: lint
  image: python:$PYTHON_VERSION
  before_script:
    - python --version
    - pip install --upgrade pip
    - pip install black flake8 isort mypy bandit
  script:
    - echo "开始代码质量检查..."
    # 代码格式化检查
    - black --check --diff .
    # 代码风格检查
    - flake8 .
    # Import排序检查
    - isort --check-only --diff .
    # 类型检查
    - mypy .
    # 安全扫描
    - bandit -r .
  artifacts:
    reports:
      codequality:
        - gl-code-quality-report.json
    when: always
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"

# 第二阶段: 测试
test-python:
  stage: test
  image: python:$PYTHON_VERSION
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.9", "3.10", "3.11"]
  before_script:
    - python --version
    - pip install --upgrade pip
    # 安装依赖 (支持多种依赖管理方式)
    - |
      if [ -f "pyproject.toml" ]; then
        pip install poetry==$POETRY_VERSION
        poetry install --no-root --no-interaction
      elif [ -f "requirements.txt" ]; then
        pip install -r requirements.txt
      elif [ -f "setup.py" ]; then
        pip install -e .
      fi
  script:
    - echo "运行Python测试..."
    # 运行测试并生成覆盖率报告
    - |
      if [ -f "pytest.ini" ] || [ -f "setup.cfg" ] || [ -f "tox.ini" ]; then
        python -m pytest tests/ \
          --cov=. \
          --cov-report=xml:coverage.xml \
          --cov-report=html:htmlcov \
          --junitxml=$TEST_REPORTS_DIR/junit.xml \
          -v
      else
        python -m pytest tests/ --cov=. --cov-report=xml:coverage.xml || echo "pytest未配置"
      fi
  artifacts:
    reports:
      junit:
        - $TEST_REPORTS_DIR/junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml
      - htmlcov/
    when: always
    expire_in: 1 week
  coverage: '/TOTAL.*?(\d+\.\d+%)/'
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"

# 第三阶段: 构建
build-package:
  stage: build
  image: python:$PYTHON_VERSION
  dependencies:
    - test-python
  before_script:
    - python --version
    - pip install --upgrade pip build twine
  script:
    - echo "构建Python包..."
    # 清理旧的构建文件
    - rm -rf dist/ build/
    # 构建包
    - python -m build
    # 验证包
    - python -m twine check dist/*
  artifacts:
    paths:
      - dist/
    expire_in: 1 month
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# Docker镜像构建
build-docker:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker info
  script:
    - echo "构建Docker镜像..."
    - docker build -t $DOCKER_IMAGE .
    - docker push $DOCKER_IMAGE
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
  only:
    variables:
      - $BUILD_DOCKER == "true"

# 第四阶段: 安全扫描
security-scan:
  stage: security
  image: python:$PYTHON_VERSION
  dependencies: []
  before_script:
    - pip install safety trivy
  script:
    - echo "运行安全扫描..."
    # 依赖安全扫描
    - safety check --json > safety-report.json || true
    # 如果有Dockerfile，进行容器扫描
    - |
      if [ -f "Dockerfile" ]; then
        trivy image --format sarif --output trivy-report.sarif $DOCKER_IMAGE || true
      fi
  artifacts:
    reports:
      sast:
        - gl-sast-report.json
    paths:
      - safety-report.json
      - trivy-report.sarif
    when: always
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# 第五阶段: 部署
deploy-staging:
  stage: deploy
  image: alpine:latest
  environment:
    name: staging
    url: https://staging.example.com
  dependencies:
    - build-package
    - security-scan
  before_script:
    - apk add --no-cache curl
  script:
    - echo "部署到预生产环境..."
    # 这里添加实际的部署命令
    - echo "部署完成"
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
      when: manual

deploy-production:
  stage: deploy
  image: alpine:latest
  environment:
    name: production
    url: https://example.com
  dependencies:
    - deploy-staging
  before_script:
    - apk add --no-cache curl
  script:
    - echo "部署到生产环境..."
    # 这里添加实际的部署命令
    - echo "部署完成"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
    - if: $CI_COMMIT_TAG
      when: manual

# 文档部署
deploy-docs:
  stage: deploy
  image: python:$PYTHON_VERSION
  environment:
    name: docs
    url: https://docs.example.com
  before_script:
    - pip install sphinx sphinx-rtd-theme
  script:
    - echo "构建和部署文档..."
    - cd docs && make html
    # 这里添加文档部署命令
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual

# 清理阶段 (可选)
cleanup:
  stage: .post  # GitLab的特殊阶段，在所有阶段后运行
  image: alpine:latest
  script:
    - echo "清理临时文件..."
    - rm -rf __pycache__ .pytest_cache .coverage
  when: always
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"

# 通知配置
include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Dependency-Scanning.gitlab-ci.yml
  - template: Security/Container-Scanning.gitlab-ci.yml

# 性能优化配置
performance:
  reports:
    browser_performance:
      - performance.json
    load_performance:
      - load.json

# 自动合并配置 (需要GitLab Ultimate)
auto_devops:
  DAST_DISABLED: "true"
  DEPLOY_VARIABLES: "true"