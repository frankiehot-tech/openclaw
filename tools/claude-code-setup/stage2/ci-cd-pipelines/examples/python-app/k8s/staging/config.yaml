apiVersion: v1
kind: ConfigMap
metadata:
  name: python-app-config
  namespace: staging
data:
  # 应用配置
  flask-env: "production"
  log-level: "INFO"
  log-format: "json"
  cors-origins: "*"

  # 数据库配置
  database-pool-size: "20"
  database-pool-recycle: "300"
  database-max-overflow: "10"

  # Redis配置
  cache-ttl: "300"
  rate-limit-window: "3600"
  rate-limit-max-requests: "100"

  # JWT配置
  jwt-access-token-expires: "3600"
  jwt-refresh-token-expires: "86400"

  # 监控配置
  enable-metrics: "true"
  metrics-port: "5000"

  # 安全配置
  password-min-length: "8"
  password-require-uppercase: "true"
  password-require-lowercase: "true"
  password-require-numbers: "true"
  password-require-special: "true"
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: staging
type: Opaque
stringData:
  # 敏感配置（在实际使用中应该使用加密的Secret或外部密钥管理）
  database-url: "postgresql://username:password@postgres-service.staging.svc.cluster.local:5432/appdb"
  redis-url: "redis://redis-service.staging.svc.cluster.local:6379/0"
  secret-key: "change-this-in-production-environment"

  # 外部服务密钥
  smtp-username: "smtp-user@example.com"
  smtp-password: "smtp-password"
  aws-access-key-id: "your-access-key"
  aws-secret-access-key: "your-secret-key"
  s3-bucket-name: "your-staging-bucket"