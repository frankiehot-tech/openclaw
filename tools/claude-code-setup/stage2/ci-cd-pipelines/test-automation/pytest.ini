# pytest配置模板
# 支持Python测试、覆盖率报告、多环境配置

[tool:pytest]

# 测试文件搜索模式
testpaths =
    tests
    src/tests
    unit_tests
    integration_tests

python_files =
    test_*.py
    *_test.py
    Test*.py
    *Test.py

python_classes =
    Test
    *Test

python_functions =
    test_*
    *_test
    should_*
    when_*
    given_*

# 忽略的文件和目录
norecursedirs =
    .git
    .venv
    venv
    env
    .env
    node_modules
    build
    dist
    __pycache__
    .pytest_cache
    .tox
    .coverage
    coverage
    htmlcov

# 标记配置
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    fast: marks tests as fast (run only fast tests with '-m fast')
    unit: unit tests
    integration: integration tests
    e2e: end-to-end tests
    smoke: smoke tests
    regression: regression tests
    database: tests that require database
    network: tests that require network
    skip: skip this test
    windows: only run on Windows
    linux: only run on Linux
    macos: only run on macOS
    ci: only run in CI environment
    local: only run locally

# 命令行选项默认值
addopts =
    --strict-markers
    --strict-config
    --tb=short
    --show-capture=no
    -v
    --color=yes
    --durations=10

# 覆盖率配置 (需要pytest-cov插件)
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:.*
    ignore::FutureWarning:.*
    default

# 测试发现选项
pythonpath =
    .
    src

# 插件配置
required_plugins =
    pytest-cov
    pytest-html
    pytest-xdist
    pytest-mock
    pytest-asyncio

# 测试运行器选项
junit_suite_name = pytest
junit_logging = all
junit_duration_report = call

# 环境特定配置
env =
    TESTING=True
    PYTHONDONTWRITEBYTECODE=1

# 并行测试配置
# xdist:
#   numprocesses = auto
#   maxworkerrestart = 2
#   loadscope = true
#   dist = load

# 覆盖率报告配置
cov =
    branch = True
    source =
        src
        app
        .
    omit =
        */tests/*
        */test_*
        */__pycache__/*
        */migrations/*
        */static/*
        */templates/*
        */admin.py
        */models.py
        */urls.py
        */wsgi.py
        */asgi.py
        */settings.py
        */manage.py
    report =
        term-missing
        html
        xml
        json
    fail_under = 80
    show_missing = True
    precision = 2

# 测试夹具作用域
fixture_scope =
    session
    module
    class
    function

# 异步测试配置
asyncio_mode = auto

# 自定义选项
custom_options =
    --ignore=*/migrations/*
    --ignore=*/node_modules/*

# 输出格式
console_output_style = classic

# 失败重试 (需要pytest-rerunfailures插件)
# reruns = 3
# reruns_delay = 1

# 超时配置 (需要pytest-timeout插件)
# timeout = 30
# timeout_method = thread

# HTML报告配置 (需要pytest-html插件)
html =
    report_title = Test Report
    extra_css = .pytest-html.css
    extra_js = .pytest-html.js

# 缓存配置
cache_dir = .pytest_cache

# 环境变量过滤
env_blacklist =
    SECRET_KEY
    DATABASE_URL
    AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY
    GITHUB_TOKEN
    SLACK_WEBHOOK_URL

# 测试数据目录
test_data_dir = tests/fixtures

# 模拟配置
mock_autospec = True

# 日志配置
log_level = INFO
log_format = "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
log_date_format = "%Y-%m-%d %H:%M:%S"
log_cli = True
log_cli_level = INFO
log_cli_format = "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
log_cli_date_format = "%Y-%m-%d %H:%M:%S"
log_file = pytest.log
log_file_level = DEBUG
log_file_format = "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
log_file_date_format = "%Y-%m-%d %H:%M:%S"

# 测试执行顺序 (需要pytest-order插件)
# order_dependencies = True

# 配置文件覆盖
# 本地开发环境覆盖
[local]
addopts =
    --tb=auto
    -v
    --color=yes
    --durations=5
cov =
    fail_under = 0
    report =
        term-missing
        html

# CI环境覆盖
[ci]
addopts =
    --tb=short
    -v
    --color=yes
    --durations=10
    --junitxml=test-results/junit.xml
    --html=test-results/report.html
    --self-contained-html
cov =
    fail_under = 80
    report =
        term-missing
        xml
        html
    data_file = .coverage.ci

# 生产环境覆盖
[production]
addopts =
    --tb=no
    -q
    --disable-warnings
cov =
    fail_under = 90
    report =
        term-missing
        xml

# 调试模式覆盖
[debug]
addopts =
    --tb=long
    -vv
    --color=yes
    --showlocals
    --full-trace
cov =
    fail_under = 0
    report =
        term-missing

# 快速测试模式
[fast]
addopts =
    --tb=short
    -v
    --color=yes
    -m "not slow and not integration and not e2e"
cov =
    fail_under = 0

# 完整测试模式
[full]
addopts =
    --tb=short
    -v
    --color=yes
    -m "not skip"
cov =
    fail_under = 80