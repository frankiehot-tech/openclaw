# Go项目CI/CD工作流
# 支持Go模块、测试、代码质量检查和安全扫描

name: Go CI

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # 每周一早上6点运行安全扫描
    - cron: '0 6 * * 1'

env:
  # Go版本配置
  GO_VERSION: '1.21'
  GO_MODULE: 'on'
  GOPROXY: 'https://proxy.golang.org,direct'
  GOSUMDB: 'sum.golang.org'

  # 测试配置
  TEST_TIMEOUT: '10m'
  RACE_DETECTOR: 'true'
  COVERAGE_THRESHOLD: '80'

  # 构建配置
  CGO_ENABLED: '0'
  GOOS: 'linux'
  GOARCH: 'amd64'

jobs:
  # 代码质量检查
  code-quality:
    name: 代码质量检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置Go环境
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: 格式化检查
        run: |
          gofmt -d . | tee gofmt.diff
          if [ -s gofmt.diff ]; then
            echo "代码格式化检查失败"
            exit 1
          fi

      - name: Vet检查
        run: |
          go vet ./...

      - name: 静态代码分析
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          args: --timeout=5m

      - name: Cyclomatic复杂度检查
        run: |
          # 安装gocyclo
          go install github.com/fzipp/gocyclo/cmd/gocyclo@latest
          gocyclo -over 15 .

  # 单元测试
  unit-tests:
    name: 单元测试
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.19', '1.20', '1.21']
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Go环境
        uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go-version }}

      - name: 运行单元测试
        run: |
          go test ./... -v -race=${{ env.RACE_DETECTOR }} -timeout=${{ env.TEST_TIMEOUT }}

      - name: 上传测试结果
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.go-version }}
          path: |
            **/test-results/
            *.xml
            *.json

  # 基准测试
  benchmark:
    name: 基准测试
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Go环境
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: 运行基准测试
        run: |
          go test ./... -bench=. -benchmem -count=5

      - name: 分析基准测试结果
        run: |
          # 这里可以添加基准测试结果分析逻辑
          echo "基准测试完成"

  # 代码覆盖率
  code-coverage:
    name: 代码覆盖率分析
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Go环境
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: 生成覆盖率报告
        run: |
          go test ./... -race -coverprofile=coverage.out -covermode=atomic
          go tool cover -func=coverage.out

      - name: 检查覆盖率阈值
        run: |
          # 检查覆盖率是否达到阈值
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "代码覆盖率: $COVERAGE%"
          if (( $(echo "$COVERAGE < $COVERAGE_THRESHOLD" | bc -l) )); then
            echo "错误: 代码覆盖率 ($COVERAGE%) 低于阈值 ($COVERAGE_THRESHOLD%)"
            exit 1
          fi

      - name: 生成HTML覆盖率报告
        run: |
          go tool cover -html=coverage.out -o coverage.html

      - name: 上传覆盖率报告
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: |
            coverage.out
            coverage.html

  # 集成测试
  integration-tests:
    name: 集成测试
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      # PostgreSQL数据库
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      # Redis缓存
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      # MySQL数据库
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: testdb
        options: >-
          --health-cmd "mysqladmin ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 3306:3306
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Go环境
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: 运行集成测试
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/testdb?sslmode=disable
          REDIS_URL: redis://localhost:6379
          MYSQL_URL: root:root@tcp(localhost:3306)/testdb
        run: |
          go test ./... -tags=integration -v -timeout=${{ env.TEST_TIMEOUT }}

  # 安全扫描
  security-scan:
    name: 安全扫描
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Go环境
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: 依赖漏洞扫描
        uses: snyk/actions/golang@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      - name: 代码安全扫描
        uses: github/codeql-action/analyze@v2
        with:
          languages: go

      - name: Gosec安全扫描
        uses: securego/gosec@master
        with:
          args: -exclude=G101 ./...  # 排除误报规则

      - name: 依赖许可证检查
        run: |
          go install github.com/google/go-licenses@latest
          go-licenses check ./...

  # 构建和打包
  build:
    name: 构建和打包
    runs-on: ubuntu-latest
    needs: [code-quality, unit-tests, integration-tests, security-scan]
    strategy:
      matrix:
        os: [linux, windows, darwin]
        arch: [amd64, arm64]
        exclude:
          - os: windows
            arch: arm64
          - os: darwin
            arch: arm64  # 暂时排除
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Go环境
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: 多平台构建
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          # 构建二进制文件
          OUTPUT_NAME="app-${{ matrix.os }}-${{ matrix.arch }}"
          if [ "${{ matrix.os }}" = "windows" ]; then
            OUTPUT_NAME="$OUTPUT_NAME.exe"
          fi

          go build -v -ldflags="-s -w" -o $OUTPUT_NAME ./cmd/main.go

      - name: 上传构建产物
        uses: actions/upload-artifact@v3
        with:
          name: build-artifacts-${{ matrix.os }}-${{ matrix.arch }}
          path: app-*

  # Docker镜像构建
  docker-build:
    name: Docker镜像构建
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录到容器注册表
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY_URL }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 构建并推送Docker镜像 (多架构)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_REGISTRY_URL }}/${{ github.repository }}:latest
            ${{ secrets.DOCKER_REGISTRY_URL }}/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  # 部署到测试环境
  deploy-staging:
    name: 部署到测试环境
    runs-on: ubuntu-latest
    needs: docker-build
    environment: staging
    if: github.ref == 'refs/heads/develop'
    steps:
      - name: 部署到Kubernetes
        uses: azure/k8s-deploy@v1
        with:
          namespace: staging
          manifests: |
            deploy/k8s/deployment.yaml
            deploy/k8s/service.yaml
            deploy/k8s/ingress.yaml
          images: |
            ${{ secrets.DOCKER_REGISTRY_URL }}/${{ github.repository }}:${{ github.sha }}

      - name: 运行冒烟测试
        run: |
          # 等待应用启动
          sleep 30
          # 运行冒烟测试
          curl -f http://localhost:8080/health || exit 1

  # 部署到生产环境
  deploy-production:
    name: 部署到生产环境
    runs-on: ubuntu-latest
    needs: [docker-build, deploy-staging]
    environment: production
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: 确认部署
        uses: actions/github-script@v6
        with:
          script: |
            // 这里可以添加部署确认逻辑
            console.log('开始生产环境部署')

      - name: 金丝雀部署到Kubernetes
        uses: azure/k8s-deploy@v1
        with:
          namespace: production
          strategy: canary
          canary-percentage: '10'
          manifests: |
            deploy/k8s/deployment.yaml
            deploy/k8s/service.yaml
            deploy/k8s/ingress.yaml
          images: |
            ${{ secrets.DOCKER_REGISTRY_URL }}/${{ github.repository }}:${{ github.sha }}

      - name: 监控金丝雀部署
        run: |
          # 监控金丝雀部署状态
          ./scripts/monitor-canary.sh

      - name: 完成金丝雀部署
        if: success()
        uses: azure/k8s-deploy@v1
        with:
          namespace: production
          action: promote
          strategy: canary

# 性能测试
performance-test:
  name: 性能测试
  runs-on: ubuntu-latest
  needs: deploy-staging
  if: github.ref == 'refs/heads/develop'
  steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 运行负载测试
      uses: gatling/gatling-action@v1
      with:
        simulation: LoadTestSimulation
        results-folder: gatling-results

    - name: 上传性能测试报告
      uses: actions/upload-artifact@v3
      with:
        name: performance-report
        path: gatling-results/

# 工作流通知
notify:
  name: 发送通知
  needs: [deploy-production, performance-test]
  if: always()
  runs-on: ubuntu-latest
  steps:
    - name: 发送Slack通知
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        author_name: Go CI/CD Pipeline
        fields: repo,message,commit,author,action
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    - name: 生成摘要报告
      run: |
        echo "Go CI/CD流水线执行完成"
        echo "构建状态: ${{ needs.deploy-production.result }}"
        echo "测试状态: ${{ needs.unit-tests.result }}"
        echo "安全扫描状态: ${{ needs.security-scan.result }}"