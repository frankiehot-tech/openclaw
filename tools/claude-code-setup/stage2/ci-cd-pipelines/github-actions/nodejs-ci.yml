# Node.js项目持续集成工作流模板
# 支持npm/yarn/pnpm，自动运行测试和构建

name: Node.js CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * 1'  # 每周一凌晨2点运行

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '8'

jobs:
  detect-package-manager:
    name: 检测包管理器
    runs-on: ubuntu-latest
    outputs:
      package-manager: ${{ steps.detect-pm.outputs.package-manager }}
      lockfile: ${{ steps.detect-pm.outputs.lockfile }}
      install-command: ${{ steps.detect-pm.outputs.install-command }}
      cache-key: ${{ steps.detect-pm.outputs.cache-key }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 检测包管理器
        id: detect-pm
        run: |
          if [ -f "pnpm-lock.yaml" ]; then
            echo "package-manager=pnpm" >> $GITHUB_OUTPUT
            echo "lockfile=pnpm-lock.yaml" >> $GITHUB_OUTPUT
            echo "install-command=pnpm install --frozen-lockfile" >> $GITHUB_OUTPUT
            echo "cache-key=pnpm-${{ hashFiles('pnpm-lock.yaml') }}" >> $GITHUB_OUTPUT
          elif [ -f "yarn.lock" ]; then
            echo "package-manager=yarn" >> $GITHUB_OUTPUT
            echo "lockfile=yarn.lock" >> $GITHUB_OUTPUT
            echo "install-command=yarn install --frozen-lockfile" >> $GITHUB_OUTPUT
            echo "cache-key=yarn-${{ hashFiles('yarn.lock') }}" >> $GITHUB_OUTPUT
          else
            echo "package-manager=npm" >> $GITHUB_OUTPUT
            echo "lockfile=package-lock.json" >> $GITHUB_OUTPUT
            echo "install-command=npm ci" >> $GITHUB_OUTPUT
            echo "cache-key=npm-${{ hashFiles('package-lock.json') }}" >> $GITHUB_OUTPUT
          fi

  setup:
    name: 设置环境
    runs-on: ubuntu-latest
    needs: detect-package-manager
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: ${{ needs.detect-package-manager.outputs.package-manager }}
          cache-dependency-path: ${{ needs.detect-package-manager.outputs.lockfile }}

      - name: 设置pnpm (如果使用)
        if: ${{ needs.detect-package-manager.outputs.package-manager == 'pnpm' }}
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 安装依赖
        run: ${{ needs.detect-package-manager.outputs.install-command }}

  lint:
    name: 代码质量检查
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: ${{ needs.detect-package-manager.outputs.package-manager }}
          cache-dependency-path: ${{ needs.detect-package-manager.outputs.lockfile }}

      - name: 安装依赖
        run: ${{ needs.detect-package-manager.outputs.install-command }}

      - name: 代码格式化检查
        run: |
          if [ -f "package.json" ] && grep -q '"prettier"' package.json; then
            npx prettier --check "**/*.{js,jsx,ts,tsx,json,css,md}"
          else
            echo "Prettier未配置，跳过格式检查"
          fi

      - name: ESLint检查
        run: |
          if [ -f "package.json" ] && grep -q '"eslint"' package.json; then
            npx eslint "**/*.{js,jsx,ts,tsx}" --max-warnings=0
          else
            echo "ESLint未配置，跳过lint检查"
          fi

      - name: 类型检查 (TypeScript)
        run: |
          if [ -f "tsconfig.json" ]; then
            npx tsc --noEmit
          else
            echo "TypeScript未配置，跳过类型检查"
          fi

  test:
    name: 运行测试
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: ${{ needs.detect-package-manager.outputs.package-manager }}
          cache-dependency-path: ${{ needs.detect-package-manager.outputs.lockfile }}

      - name: 安装依赖
        run: ${{ needs.detect-package-manager.outputs.install-command }}

      - name: 运行单元测试
        run: |
          if [ -f "package.json" ] && grep -q '"test"' package.json; then
            npm test -- --coverage
          else
            echo "测试脚本未配置"
            # 尝试常见测试框架
            npx jest --coverage || npx mocha --reporter=spec || echo "未找到测试框架"
          fi

      - name: 上传覆盖率报告
        uses: codecov/codecov-action@v3
        if: success()
        with:
          file: ./coverage/lcov.info
          fail_ci_if_error: false

  build:
    name: 构建项目
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: ${{ needs.detect-package-manager.outputs.package-manager }}
          cache-dependency-path: ${{ needs.detect-package-manager.outputs.lockfile }}

      - name: 安装依赖
        run: ${{ needs.detect-package-manager.outputs.install-command }}

      - name: 构建项目
        run: |
          if [ -f "package.json" ] && grep -q '"build"' package.json; then
            npm run build
          else
            echo "构建脚本未配置"
          fi

      - name: 上传构建产物
        uses: actions/upload-artifact@v3
        with:
          name: nodejs-build
          path: |
            dist/
            build/
            public/
          retention-days: 7

  security:
    name: 安全扫描
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: ${{ needs.detect-package-manager.outputs.package-manager }}
          cache-dependency-path: ${{ needs.detect-package-manager.outputs.lockfile }}

      - name: 安装依赖
        run: ${{ needs.detect-package-manager.outputs.install-command }}

      - name: 依赖安全扫描 (npm audit)
        run: |
          if [ "${{ needs.detect-package-manager.outputs.package-manager }}" = "npm" ]; then
            npm audit --audit-level=high
          elif [ "${{ needs.detect-package-manager.outputs.package-manager }}" = "yarn" ]; then
            yarn audit --level high
          elif [ "${{ needs.detect-package-manager.outputs.package-manager }}" = "pnpm" ]; then
            pnpm audit --audit-level=high
          fi

      - name: 代码安全扫描
        uses: github/codeql-action/analyze@v2
        with:
          languages: javascript
          queries: security-and-quality

      - name: 容器安全扫描 (如有Dockerfile)
        if: ${{ startsWith(github.repository, 'docker/') || contains(github.event.repository.description, 'docker') }}
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/${{ github.repository }}:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: 上传安全扫描结果
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  deploy:
    name: 部署到生产环境
    runs-on: ubuntu-latest
    needs: [build, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: ${{ steps.deploy.outputs.deployment-url }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 安装依赖
        run: ${{ needs.detect-package-manager.outputs.install-command }}

      - name: 构建项目
        run: npm run build

      - name: 部署到Vercel
        if: ${{ contains(github.event.repository.topics, 'vercel') || contains(github.event.repository.description, 'vercel') }}
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'

      - name: 部署到AWS S3
        if: ${{ contains(github.event.repository.topics, 'aws') || contains(github.event.repository.description, 'aws') }}
        uses: jakejarvis/s3-sync-action@master
        with:
          args: --acl public-read --follow-symlinks --delete
        env:
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: 'us-east-1'
          SOURCE_DIR: 'dist'

      - name: 部署到GitHub Pages
        if: ${{ !contains(github.event.repository.topics, 'vercel') && !contains(github.event.repository.description, 'aws') }}
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

# 工作流配置
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 通知配置
notifications:
  on_success: never
  on_failure: always

# 超时配置
timeout-minutes: 45