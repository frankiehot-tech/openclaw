# Docker镜像持续集成工作流模板
# 自动构建、测试和推送Docker镜像到容器注册表

name: Docker CI/CD

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * 1'  # 每周一凌晨2点运行
  workflow_dispatch:  # 手动触发
    inputs:
      image_tag:
        description: '镜像标签'
        required: true
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOCKER_BUILDKIT: 1

jobs:
  docker-lint:
    name: Dockerfile语法检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装hadolint
        run: |
          curl -sSL https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64 -o /usr/local/bin/hadolint
          chmod +x /usr/local/bin/hadolint

      - name: 检查Dockerfile语法
        run: |
          hadolint Dockerfile || echo "hadolint发现问题，请检查Dockerfile语法"
        continue-on-error: true

      - name: 多阶段构建检查
        run: |
          if ! grep -q "FROM.*AS.*builder\|FROM.*as.*builder" Dockerfile; then
            echo "⚠️  建议使用多阶段构建优化镜像大小"
          fi

      - name: 安全检查
        run: |
          echo "Dockerfile安全检查:"
          echo "1. 检查是否使用非root用户..."
          if ! grep -q "USER.*1000\|USER.*65532" Dockerfile; then
            echo "❌ 建议添加非root用户"
          else
            echo "✅ 使用了非root用户"
          fi

          echo "2. 检查是否更新包缓存..."
          if ! grep -q "apt-get update && apt-get upgrade" Dockerfile; then
            echo "⚠️  建议更新包缓存以获取安全更新"
          fi

          echo "3. 检查是否清理包缓存..."
          if ! grep -q "rm -rf /var/lib/apt/lists/\*" Dockerfile; then
            echo "⚠️  建议清理包缓存减少镜像大小"
          fi

  docker-test:
    name: 容器测试
    runs-on: ubuntu-latest
    needs: docker-lint
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建测试镜像
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:test .

      - name: 运行容器健康检查
        run: |
          docker run -d --name test-container -p 8080:8080 ${{ env.IMAGE_NAME }}:test
          sleep 10

          # 检查容器是否运行
          if docker ps | grep -q test-container; then
            echo "✅ 容器正常运行"
          else
            echo "❌ 容器启动失败"
            docker logs test-container
            exit 1
          fi

          # 健康检查
          if curl -s http://localhost:8080/health > /dev/null; then
            echo "✅ 健康检查通过"
          else
            echo "❌ 健康检查失败"
            exit 1
          fi

          docker stop test-container
          docker rm test-container

      - name: 容器安全扫描
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:test
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: 上传安全扫描结果
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  docker-build:
    name: 构建和推送镜像
    runs-on: ubuntu-latest
    needs: docker-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 登录到容器注册表
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 提取元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: 设置Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建并推送
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: 生成SBOM
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            anchore/syft:latest \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            -o spdx-json > sbom.json

      - name: 上传SBOM
        uses: actions/upload-artifact@v3
        with:
          name: sbom
          path: sbom.json

  deploy-staging:
    name: 部署到预生产环境
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://staging.example.com

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: 配置Kubernetes上下文
        run: |
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" > kubeconfig.yaml
          export KUBECONFIG=kubeconfig.yaml

      - name: 更新镜像版本
        run: |
          sed -i "s|image:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}|g" deployment/kubernetes/staging/deployment.yaml

      - name: 部署到Kubernetes
        run: |
          kubectl apply -f deployment/kubernetes/staging/
          kubectl rollout status deployment/app -n staging --timeout=300s

  deploy-production:
    name: 部署到生产环境
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: https://example.com

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: 配置Kubernetes上下文
        run: |
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" > kubeconfig.yaml
          export KUBECONFIG=kubeconfig.yaml

      - name: 蓝绿部署准备
        run: |
          # 创建新部署
          sed "s|image:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}|g" deployment/kubernetes/production/deployment.yaml > deployment-green.yaml
          sed -i 's/name: app-deployment/name: app-deployment-green/g' deployment-green.yaml

          # 应用新部署
          kubectl apply -f deployment-green.yaml
          kubectl rollout status deployment/app-deployment-green -n production --timeout=300s

      - name: 切换流量
        run: |
          # 更新服务指向新部署
          kubectl patch service app-service -n production -p '{"spec":{"selector":{"app":"app","version":"green"}}}'
          sleep 30  # 等待流量切换

      - name: 清理旧部署
        run: |
          kubectl delete deployment app-deployment -n production || true

      - name: 健康检查
        run: |
          # 验证新部署正常运行
          kubectl get pods -n production
          kubectl get services -n production

# 工作流配置
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 通知配置
notifications:
  on_success: never
  on_failure: always

# 超时配置
timeout-minutes: 45