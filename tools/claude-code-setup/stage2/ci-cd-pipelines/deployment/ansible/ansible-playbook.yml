# Ansible Playbook配置模板
# 用于服务器配置管理、应用部署和基础设施管理

---
# 剧本元数据
- name: 部署和管理应用基础设施
  hosts: all
  become: true
  gather_facts: true
  serial: "{{ serial_count | default(10) }}"

  # 变量定义
  vars:
    # 应用配置
    app_name: "{{ app_name | default('myapp') }}"
    app_version: "{{ app_version | default('latest') }}"
    app_port: "{{ app_port | default(8080) }}"
    app_user: "{{ app_user | default('appuser') }}"
    app_group: "{{ app_group | default('appgroup') }}"

    # 环境配置
    environment: "{{ environment | default('dev') }}"
    node_env: "{{ node_env | default('production') }}"
    log_level: "{{ log_level | default('info') }}"

    # 目录配置
    app_dir: "/opt/{{ app_name }}"
    log_dir: "/var/log/{{ app_name }}"
    config_dir: "/etc/{{ app_name }}"
    data_dir: "/var/lib/{{ app_name }}"

    # 服务配置
    service_name: "{{ app_name }}"
    service_description: "{{ app_description | default('My Application') }}"

    # 数据库配置
    db_host: "{{ db_host | default('localhost') }}"
    db_port: "{{ db_port | default(5432) }}"
    db_name: "{{ db_name | default(app_name) }}"
    db_user: "{{ db_user | default(app_name) }}"
    db_password: "{{ db_password | default('changeme') }}"

    # 依赖版本
    nodejs_version: "{{ nodejs_version | default('18') }}"
    python_version: "{{ python_version | default('3.9') }}"
    docker_version: "{{ docker_version | default('24') }}"

    # 安全配置
    firewall_enabled: "{{ firewall_enabled | default(true) }}"
    ssh_port: "{{ ssh_port | default(22) }}"
    fail2ban_enabled: "{{ fail2ban_enabled | default(true) }}"

  # 环境变量
  environment:
    NODE_ENV: "{{ node_env }}"
    APP_NAME: "{{ app_name }}"
    LOG_LEVEL: "{{ log_level }}"

  # 前置任务：环境检查和准备
  pre_tasks:
    - name: 检查Ansible版本
      ansible.builtin.assert:
        that:
          - ansible_version.full is version_compare('2.10', '>=')
        fail_msg: "需要Ansible 2.10或更高版本"

    - name: 检查操作系统兼容性
      ansible.builtin.fail:
        msg: "不支持的操作系统：{{ ansible_distribution }} {{ ansible_distribution_major_version }}"
      when: ansible_distribution not in ['Ubuntu', 'Debian', 'CentOS', 'RedHat', 'Amazon']

    - name: 设置事实：包管理器
      ansible.builtin.set_fact:
        pkg_manager: "apt"
      when: ansible_os_family == "Debian"

    - name: 设置事实：包管理器
      ansible.builtin.set_fact:
        pkg_manager: "yum"
      when: ansible_os_family == "RedHat"

  # 处理程序定义
  handlers:
    - name: 重启应用服务
      ansible.builtin.service:
        name: "{{ service_name }}"
        state: restarted
        enabled: true

    - name: 重新加载系统守护进程
      ansible.builtin.systemd:
        daemon_reload: true

    - name: 重启Nginx
      ansible.builtin.service:
        name: nginx
        state: restarted

    - name: 重启数据库
      ansible.builtin.service:
        name: "{{ db_service | default('postgresql') }}"
        state: restarted

    - name: 重启防火墙
      ansible.builtin.service:
        name: "{{ firewall_service }}"
        state: restarted

  # 主要任务
  tasks:
    # 第一阶段：系统基础配置
    - name: 更新APT缓存 (Debian系统)
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      when: pkg_manager == "apt"

    - name: 更新YUM缓存 (RedHat系统)
      ansible.builtin.yum:
        update_cache: true
      when: pkg_manager == "yum"

    - name: 安装基础工具包
      ansible.builtin.package:
        name:
          - curl
          - wget
          - git
          - vim
          - htop
          - net-tools
          - telnet
          - nc
          - jq
          - unzip
        state: present

    - name: 配置主机名
      ansible.builtin.hostname:
        name: "{{ app_name }}-{{ environment }}-{{ ansible_hostname }}"

    - name: 配置时区
      ansible.builtin.timezone:
        name: Asia/Shanghai

    - name: 配置NTP同步
      ansible.builtin.package:
        name: chrony
        state: present
      when: ansible_distribution != 'Amazon'

    - name: 启动并启用chronyd服务
      ansible.builtin.service:
        name: chronyd
        state: started
        enabled: true
      when: ansible_distribution != 'Amazon'

    # 第二阶段：安全配置
    - name: 创建应用用户和组
      ansible.builtin.user:
        name: "{{ app_user }}"
        group: "{{ app_group }}"
        shell: /bin/bash
        create_home: true
        home: "/home/{{ app_user }}"
        system: false
        password: "{{ app_password | default('!') | password_hash('sha512') }}"

    - name: 配置SSH安全设置
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^{{ item.regexp }}"
        line: "{{ item.line }}"
        state: present
        validate: /usr/sbin/sshd -t -f %s
      with_items:
        - { regexp: '^#?Port', line: 'Port {{ ssh_port }}' }
        - { regexp: '^#?PasswordAuthentication', line: 'PasswordAuthentication no' }
        - { regexp: '^#?PermitRootLogin', line: 'PermitRootLogin no' }
        - { regexp: '^#?PubkeyAuthentication', line: 'PubkeyAuthentication yes' }
        - { regexp: '^#?ClientAliveInterval', line: 'ClientAliveInterval 300' }
        - { regexp: '^#?ClientAliveCountMax', line: 'ClientAliveCountMax 2' }
      notify: 重启SSH服务

    - name: 配置防火墙
      ansible.builtin.firewalld:
        service: "{{ item }}"
        permanent: true
        immediate: true
        state: enabled
      with_items:
        - ssh
        - http
        - https
      when: firewall_enabled and ansible_os_family == "RedHat"

    - name: 配置UFW防火墙 (Ubuntu/Debian)
      ansible.builtin.ufw:
        rule: "{{ item.rule }}"
        port: "{{ item.port }}"
        proto: "{{ item.proto | default('tcp') }}"
      with_items:
        - { rule: allow, port: "{{ ssh_port }}", proto: tcp }
        - { rule: allow, port: 80, proto: tcp }
        - { rule: allow, port: 443, proto: tcp }
        - { rule: allow, port: "{{ app_port }}", proto: tcp }
      when: firewall_enabled and ansible_os_family == "Debian"

    - name: 安装并配置fail2ban
      ansible.builtin.package:
        name: fail2ban
        state: present
      when: fail2ban_enabled

    - name: 配置fail2ban jail
      ansible.builtin.template:
        src: fail2ban-jail.local.j2
        dest: /etc/fail2ban/jail.local
        owner: root
        group: root
        mode: '0644'
      when: fail2ban_enabled
      notify: 重启fail2ban服务

    # 第三阶段：安装运行时依赖
    - name: 安装Node.js (使用NodeSource)
      ansible.builtin.apt_repository:
        repo: "deb https://deb.nodesource.com/node_{{ nodejs_version }}.x {{ ansible_distribution_release }} main"
        state: present
        update_cache: true
      when: pkg_manager == "apt" and nodejs_version is defined

    - name: 安装Node.js包
      ansible.builtin.package:
        name:
          - nodejs
          - npm
        state: present
      when: nodejs_version is defined

    - name: 安装Python和pip
      ansible.builtin.package:
        name:
          - python{{ python_version }}
          - python{{ python_version }}-pip
          - python{{ python_version }}-dev
        state: present
      when: python_version is defined

    - name: 安装Docker
      ansible.builtin.include_role:
        name: geerlingguy.docker
      vars:
        docker_install_compose: true
        docker_users:
          - "{{ app_user }}"
      when: docker_version is defined

    - name: 安装Docker Compose
      ansible.builtin.get_url:
        url: "https://github.com/docker/compose/releases/download/v{{ docker_compose_version | default('2.20') }}/docker-compose-linux-x86_64"
        dest: /usr/local/bin/docker-compose
        mode: '0755'
      when: docker_version is defined

    # 第四阶段：配置应用目录结构
    - name: 创建应用目录
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: '0755'
      with_items:
        - "{{ app_dir }}"
        - "{{ log_dir }}"
        - "{{ config_dir }}"
        - "{{ data_dir }}"
        - "{{ app_dir }}/releases"
        - "{{ app_dir }}/shared"
        - "{{ app_dir }}/shared/logs"
        - "{{ app_dir }}/shared/config"
        - "{{ app_dir }}/shared/tmp"

    - name: 创建符号链接
      ansible.builtin.file:
        src: "{{ app_dir }}/releases/{{ app_version }}"
        dest: "{{ app_dir }}/current"
        state: link
        owner: "{{ app_user }}"
        group: "{{ app_group }}"

    # 第五阶段：部署应用代码
    - name: 从Git仓库克隆代码
      ansible.builtin.git:
        repo: "{{ git_repository }}"
        dest: "{{ app_dir }}/releases/{{ app_version }}"
        version: "{{ git_branch | default('main') }}"
        force: true
        accept_hostkey: true
      when: git_repository is defined

    - name: 复制应用配置文件
      ansible.builtin.template:
        src: "{{ item.src }}"
        dest: "{{ app_dir }}/shared/config/{{ item.dest }}"
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: '0640'
      with_items:
        - { src: "env.j2", dest: ".env" }
        - { src: "config.yaml.j2", dest: "config.yaml" }
        - { src: "database.yaml.j2", dest: "database.yaml" }

    - name: 安装应用依赖 (Node.js)
      ansible.builtin.shell:
        cmd: "npm ci --production"
        chdir: "{{ app_dir }}/releases/{{ app_version }}"
        creates: "{{ app_dir }}/releases/{{ app_version }}/node_modules"
      when: nodejs_version is defined

    - name: 安装应用依赖 (Python)
      ansible.builtin.shell:
        cmd: "pip install -r requirements.txt"
        chdir: "{{ app_dir }}/releases/{{ app_version }}"
      when: python_version is defined and "'requirements.txt' in lookup('fileglob', app_dir + '/releases/' + app_version + '/*')"

    - name: 构建应用 (如果存在构建脚本)
      ansible.builtin.shell:
        cmd: "npm run build"
        chdir: "{{ app_dir }}/releases/{{ app_version }}"
      when: "'package.json' in lookup('fileglob', app_dir + '/releases/' + app_version + '/*')"

    # 第六阶段：配置系统服务
    - name: 创建systemd服务文件
      ansible.builtin.template:
        src: "app.service.j2"
        dest: "/etc/systemd/system/{{ service_name }}.service"
        owner: root
        group: root
        mode: '0644'
      notify: 重新加载系统守护进程

    - name: 创建Nginx配置文件
      ansible.builtin.template:
        src: "nginx.conf.j2"
        dest: "/etc/nginx/sites-available/{{ app_name }}"
        owner: root
        group: root
        mode: '0644'
      when: "'nginx' in group_names"
      notify: 重启Nginx

    - name: 启用Nginx站点
      ansible.builtin.file:
        src: "/etc/nginx/sites-available/{{ app_name }}"
        dest: "/etc/nginx/sites-enabled/{{ app_name }}"
        state: link
      when: "'nginx' in group_names"

    # 第七阶段：配置日志管理
    - name: 配置logrotate
      ansible.builtin.template:
        src: "logrotate.conf.j2"
        dest: "/etc/logrotate.d/{{ app_name }}"
        owner: root
        group: root
        mode: '0644'

    - name: 配置日志目录权限
      ansible.builtin.file:
        path: "{{ log_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: '0755'
        recurse: true

    # 第八阶段：配置监控
    - name: 安装并配置Prometheus Node Exporter
      ansible.builtin.include_role:
        name: cloudalchemy.node_exporter
      when: "'monitoring' in group_names"

    - name: 安装并配置Grafana
      ansible.builtin.include_role:
        name: cloudalchemy.grafana
      when: "'monitoring' in group_names"

    # 第九阶段：启动服务
    - name: 启动应用服务
      ansible.builtin.service:
        name: "{{ service_name }}"
        state: started
        enabled: true

    - name: 验证服务状态
      ansible.builtin.wait_for:
        port: "{{ app_port }}"
        host: "{{ ansible_default_ipv4.address }}"
        delay: 10
        timeout: 60

    - name: 运行健康检查
      ansible.builtin.uri:
        url: "http://localhost:{{ app_port }}/health"
        method: GET
        status_code: 200
        timeout: 10
      register: health_check

    - name: 显示部署结果
      ansible.builtin.debug:
        msg: "应用部署成功！服务运行在 http://{{ ansible_default_ipv4.address }}:{{ app_port }}"

  # 后置任务：清理和验证
  post_tasks:
    - name: 清理临时文件
      ansible.builtin.file:
        path: "/tmp/{{ app_name }}-*"
        state: absent

    - name: 验证部署完整性
      ansible.builtin.shell:
        cmd: "systemctl is-active {{ service_name }}"
      register: service_status
      changed_when: false

    - name: 发送部署通知
      ansible.builtin.uri:
        url: "{{ slack_webhook_url }}"
        method: POST
        body_format: json
        body:
          text: "部署完成: {{ app_name }} {{ app_version }} 已部署到 {{ environment }} 环境"
      when: slack_webhook_url is defined

  # 错误处理
  rescue:
    - name: 记录部署失败
      ansible.builtin.debug:
        msg: "部署失败！错误: {{ ansible_failed_result.msg }}"

    - name: 回滚到上一个版本
      ansible.builtin.file:
        src: "{{ app_dir }}/releases/{{ previous_version }}"
        dest: "{{ app_dir }}/current"
        state: link
        force: true
      when: previous_version is defined

    - name: 重启上一个版本
      ansible.builtin.service:
        name: "{{ service_name }}"
        state: restarted

    - name: 发送失败通知
      ansible.builtin.uri:
        url: "{{ slack_webhook_url }}"
        method: POST
        body_format: json
        body:
          text: "部署失败: {{ app_name }} {{ app_version }} 部署到 {{ environment }} 环境失败，已回滚"
      when: slack_webhook_url is defined

# 使用说明:
# 1. 安装Ansible: pip install ansible
# 2. 配置inventory文件: hosts.ini
# 3. 创建vars文件: group_vars/all.yml
# 4. 运行playbook: ansible-playbook -i hosts.ini ansible-playbook.yml
# 5. 带变量运行: ansible-playbook -i hosts.ini ansible-playbook.yml -e "app_version=1.2.3 environment=prod"

# 目录结构:
# ansible/
# ├── ansible-playbook.yml    (此文件)
# ├── hosts.ini              (主机清单)
# ├── group_vars/
# │   ├── all.yml            (全局变量)
# │   └── webservers.yml     (Web服务器变量)
# ├── host_vars/
# │   └── server1.yml        (主机特定变量)
# ├── roles/
# │   ├── common/            (基础配置角色)
# │   ├── nodejs/            (Node.js角色)
# │   ├── nginx/             (Nginx角色)
# │   └── monitoring/        (监控角色)
# ├── templates/
# │   ├── env.j2             (环境变量模板)
# │   ├── nginx.conf.j2      (Nginx配置模板)
# │   └── app.service.j2     (systemd服务模板)
# └── files/
#     ├── ssh_keys/          (SSH密钥)
#     └── ssl/               (SSL证书)

# 最佳实践:
# 1. 使用角色组织任务
# 2. 使用变量提高可重用性
# 3. 使用模板动态生成配置文件
# 4. 实施幂等性：确保任务可重复执行
# 5. 使用处理程序管理服务重启
# 6. 配置适当的错误处理和回滚
# 7. 使用标签控制任务执行
# 8. 实施安全最佳实践
# 9. 配置监控和日志记录
# 10. 定期更新和维护playbook

# 安全注意事项:
# 1. 使用Ansible Vault加密敏感数据
# 2. 实施最小权限原则
# 3. 定期轮换SSH密钥和密码
# 4. 配置防火墙和入侵检测
# 5. 审计和记录所有变更
# 6. 使用安全的通信协议
# 7. 定期更新软件包和安全补丁