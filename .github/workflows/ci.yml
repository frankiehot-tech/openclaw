name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-ruff@v1
        with:
          version: '0.15.11'
      - run: ruff check scripts/ athena/ execution/ ops/ governance/ config/ workflow/ monitoring/ agent_system/ src/skills/ tests/
      - run: ruff format --check scripts/ athena/ execution/ ops/ governance/ config/ workflow/ monitoring/ agent_system/ src/skills/ tests/

  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install mypy==1.20.2 -r requirements.txt
      - run: mypy scripts/ athena/ execution/ ops/ governance/ config/ workflow/ monitoring/ agent_system/ src/skills/ tests/ --ignore-missing-imports --show-error-codes

  test:
    name: Test (pytest)
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install pytest coverage -r requirements.txt
      - run: coverage run -m pytest --tb=short --timeout=60 --maxfail=10 --junitxml=test-results.xml
      - run: coverage report -m --fail-under=10
      - run: coverage xml -o coverage.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-py${{ matrix.python-version }}
          path: |
            test-results.xml
            coverage.xml

  security-bandit:
    name: Security (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install bandit==1.9.4
      - run: set -o pipefail && bandit -r scripts/ athena/ execution/ ops/ governance/ config/ workflow/ monitoring/ agent_system/ src/skills/ tests/ -x .venv,.venv311,.venvs,venv,comfyui_workspace --skip B101 -ll 2>&1 | head -100

  security-pip-audit:
    name: Security (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install pip-audit -r requirements.txt
      - run: set -o pipefail && pip-audit 2>&1 | head -50

  secret-scan:
    name: Secret Scan (trufflehog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Secret Scan (trufflehog)
        run: |
          pip install trufflehog==3.82.0
          set -o pipefail && trufflehog filesystem --directory=. --only-verified=false --json 2>&1 | head -100
