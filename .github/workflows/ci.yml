name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-ruff@v1
        with:
          version: '0.15.11'
      - run: ruff check scripts/ athena/ execution/ ops/
      - run: ruff format --check scripts/ athena/ execution/ ops/

  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install mypy==1.20.2 -r requirements.txt
      - run: mypy scripts/ athena/ execution/ ops/ --ignore-missing-imports --show-error-codes

  test:
    name: Test (pytest)
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install pytest coverage -r requirements.txt
      - run: pytest --tb=short --timeout=60 -x 2>&1 | head -200
        continue-on-error: true
      - run: coverage run -m pytest --tb=short --timeout=60 2>&1 | tail -20
        continue-on-error: true
      - run: coverage report -m 2>&1 | head -50
        continue-on-error: true

  security-bandit:
    name: Security (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install bandit==1.9.4
      - run: bandit -r scripts/ athena/ execution/ ops/ -x .venv,.venv311,.venvs,venv,comfyui_workspace --skip B101,B404,B603,B607 -ll 2>&1 | head -100
        continue-on-error: true

  security-pip-audit:
    name: Security (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install pip-audit -r requirements.txt
      - run: pip-audit 2>&1 | head -50
        continue-on-error: true

  secret-scan:
    name: Secret Scan (trufflehog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.event.after }}
          extra_args: --only-verified=false --json 2>&1 | head -50
        continue-on-error: true
