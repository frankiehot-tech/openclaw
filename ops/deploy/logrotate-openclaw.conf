# newsyslog.conf entry for OpenClaw logs
# Install: sudo cp this-file /etc/newsyslog.d/openclaw.conf
# Verify: newsyslog -nv
#
# Format:
#   logfile  [owner:group]  mode  count  size  when  flags  pid_file  sig_type
#
# count=5: keep 5 rotated archives
# size=102400: rotate at 100MB (in KB)
# flag=J: compress with bzip2
# flag=N: no special handling

/Volumes/1TB-M2/openclaw/logs/athena_ai_plan_build_worker.log  frankie:staff  644  5  102400  *  JN  /Volumes/1TB-M2/openclaw/logs/queue_monitor.pid  SIGHUP

/Volumes/1TB-M2/openclaw/logs/athena_ai_plan_runner.log  frankie:staff  644  5  51200  *  JN  /Volumes/1TB-M2/openclaw/logs/athena_ai_plan_runner.pid  SIGHUP

/Volumes/1TB-M2/openclaw/logs/athena_web_desktop_compat.log  frankie:staff  644  5  51200  *  JN
