# Python项目持续集成工作流模板
# 自动检测Python版本，运行测试和代码质量检查

name: Python CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * 1'  # 每周一凌晨2点运行

env:
  PYTHON_VERSION: '3.11'
  POETRY_VERSION: '1.7.1'

jobs:
  lint:
    name: 代码质量检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 isort mypy bandit

      - name: 代码格式化检查 (Black)
        run: black --check --diff .

      - name: 代码风格检查 (Flake8)
        run: flake8 .

      - name: Import排序检查 (isort)
        run: isort --check-only --diff .

      - name: 类型检查 (mypy)
        run: mypy .

      - name: 安全扫描 (bandit)
        run: bandit -r .

  test:
    name: 运行测试
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: 缓存依赖
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt', 'setup.py', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          if [ -f "pyproject.toml" ]; then
            pip install poetry
            poetry install --no-root
          elif [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          elif [ -f "setup.py" ]; then
            pip install -e .
          else
            echo "未找到依赖配置文件"
          fi

      - name: 运行单元测试
        run: |
          if [ -f "pytest.ini" ] || [ -f "setup.cfg" ] || [ -f "tox.ini" ]; then
            python -m pytest tests/ --cov=. --cov-report=xml --cov-report=html
          else
            python -m pytest tests/ || echo "pytest未安装或未配置"
          fi

      - name: 上传覆盖率报告
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  build:
    name: 构建包
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 构建Python包
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*

      - name: 上传构建产物
        uses: actions/upload-artifact@v3
        with:
          name: python-package
          path: dist/
          retention-days: 7

  security:
    name: 安全扫描
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 依赖安全扫描
        uses: pyupio/safety@v2
        with:
          api-key: ${{ secrets.SAFETY_API_KEY }}

      - name: 容器镜像安全扫描
        if: ${{ startsWith(github.repository, 'docker/') || contains(github.event.repository.description, 'docker') }}
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/${{ github.repository }}:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: 上传安全扫描结果
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  deploy-docs:
    name: 部署文档
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 安装文档依赖
        run: |
          pip install sphinx sphinx-rtd-theme
          if [ -f "docs/requirements.txt" ]; then
            pip install -r docs/requirements.txt
          fi

      - name: 构建文档
        run: |
          cd docs && make html

      - name: 部署到GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/_build/html

# 工作流配置
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 通知配置
notifications:
  on_success: never
  on_failure: always

# 超时配置
timeout-minutes: 30