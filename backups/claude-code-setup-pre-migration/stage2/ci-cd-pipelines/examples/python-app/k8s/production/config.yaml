apiVersion: v1
kind: ConfigMap
metadata:
  name: python-app-config
  namespace: production
data:
  # 应用配置
  flask-env: "production"
  log-level: "WARNING"
  log-format: "json"
  cors-origins: "https://example.com"

  # 数据库配置
  database-pool-size: "50"
  database-pool-recycle: "300"
  database-max-overflow: "20"

  # Redis配置
  cache-ttl: "600"
  rate-limit-window: "3600"
  rate-limit-max-requests: "500"

  # JWT配置
  jwt-access-token-expires: "1800"  # 30分钟
  jwt-refresh-token-expires: "2592000"  # 30天

  # 监控配置
  enable-metrics: "true"
  metrics-port: "5000"

  # 安全配置
  password-min-length: "12"
  password-require-uppercase: "true"
  password-require-lowercase: "true"
  password-require-numbers: "true"
  password-require-special: "true"

  # API配置
  api-rate-limit-enabled: "true"
  api-rate-limit-default: "1000/hour"
  api-rate-limit-auth: "100/hour"
  api-rate-limit-admin: "5000/hour"

  # 外部服务配置
  smtp-host: "smtp.gmail.com"
  smtp-port: "587"
  smtp-use-tls: "true"
  aws-region: "us-east-1"
---
