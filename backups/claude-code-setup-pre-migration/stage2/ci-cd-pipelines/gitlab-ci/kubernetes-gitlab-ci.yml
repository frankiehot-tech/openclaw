# GitLab CI/CD配置文件模板 - Kubernetes部署
# 专门用于Kubernetes应用的CI/CD流水线，支持多环境部署、蓝绿部署、金丝雀发布

# 定义工作流规则
workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"
      when: always
    - if: $CI_COMMIT_TAG
      when: always
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always
    - when: never

# 定义全局变量
variables:
  DOCKER_IMAGE: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
  HELM_VERSION: "3.14"
  KUBECTL_VERSION: "1.28"

  # 环境配置
  K8S_NAMESPACE_DEV: "dev"
  K8S_NAMESPACE_STAGING: "staging"
  K8S_NAMESPACE_PROD: "production"

  # 部署策略
  DEPLOYMENT_STRATEGY: "rolling"  # rolling, blue-green, canary
  ROLLING_UPDATE_MAX_SURGE: "25%"
  ROLLING_UPDATE_MAX_UNAVAILABLE: "0"

# 全局缓存配置
cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .cache/helm/
    - .cache/kubectl/
  policy: pull-push

# 定义管道阶段
stages:
  - validate
  - build
  - test
  - security
  - package
  - deploy-dev
  - deploy-staging
  - deploy-prod
  - monitor

# 第一阶段: 配置验证
validate-manifests:
  stage: validate
  image: bitnami/kubectl:$KUBECTL_VERSION
  script:
    - echo "验证Kubernetes配置文件..."
    # 验证YAML语法
    - |
      find . -name "*.yaml" -o -name "*.yml" | while read file; do
        echo "验证文件: $file"
        kubectl apply --dry-run=client -f "$file" || exit 1
      done
    # 验证Kustomize配置
    - |
      if [ -f "kustomization.yaml" ] || [ -f "kustomization.yml" ]; then
        kubectl kustomize . > /dev/null || echo "Kustomize验证失败"
      fi
    # 验证Helm charts
    - |
      if [ -d "charts/" ] || [ -f "Chart.yaml" ]; then
        helm lint . || echo "Helm lint失败"
      fi
  artifacts:
    reports:
      codequality:
        - gl-code-quality-report.json
    when: always
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"

# 第二阶段: 构建Docker镜像
build-docker:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - echo "构建Docker镜像..."
    - docker build -t $DOCKER_IMAGE .
    - docker push $DOCKER_IMAGE
  artifacts:
    paths:
      - docker-build.log
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"

# 第三阶段: Kubernetes配置测试
k8s-test:
  stage: test
  image: bitnami/kubectl:$KUBECTL_VERSION
  services:
    - name: bitnami/kubeadm:latest
      alias: kube-api
  variables:
    KUBECONFIG: "/kubeconfig"
  before_script:
    # 设置测试Kubernetes集群
    - |
      kubeadm init --pod-network-cidr=10.244.0.0/16
      kubectl apply -f https://raw.githubusercontent.com/flannel-io/flannel/master/Documentation/kube-flannel.yml
      kubectl taint nodes --all node-role.kubernetes.io/control-plane-
  script:
    - echo "运行Kubernetes配置测试..."
    # 在测试集群中部署应用
    - kubectl apply -f manifests/ -n test --dry-run=server
    # 运行conftest策略测试
    - |
      if command -v conftest &> /dev/null; then
        conftest test manifests/ --policy policies/ || echo "策略测试失败"
      fi
    # 验证资源限制
    - |
      for file in manifests/*.yaml; do
        if grep -q "limits:" "$file" || grep -q "requests:" "$file"; then
          echo "资源限制检查通过: $file"
        else
          echo "警告: $file 缺少资源限制"
        fi
      done
  artifacts:
    paths:
      - k8s-test-results/
    when: always
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"

# 第四阶段: 安全扫描
k8s-security:
  stage: security
  image: aquasec/trivy:latest
  script:
    - echo "运行Kubernetes安全扫描..."
    # 容器镜像安全扫描
    - trivy image --format sarif --output trivy-image.sarif $DOCKER_IMAGE
    # 配置文件安全扫描
    - trivy config --format sarif --output trivy-config.sarif manifests/
    # 检查安全上下文
    - |
      echo "检查Pod安全上下文..."
      for file in manifests/*.yaml; do
        if grep -q "securityContext:" "$file"; then
          echo "安全上下文检查通过: $file"
        else
          echo "警告: $file 缺少安全上下文"
        fi
      done
  artifacts:
    reports:
      sast:
        - gl-sast-report.json
    paths:
      - trivy-image.sarif
      - trivy-config.sarif
    when: always
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# 第五阶段: 打包Helm chart
package-helm:
  stage: package
  image: alpine/helm:$HELM_VERSION
  dependencies:
    - build-docker
    - k8s-security
  script:
    - echo "打包Helm chart..."
    # 检测并打包Helm chart
    - |
      if [ -f "Chart.yaml" ]; then
        # 更新values.yaml中的镜像标签
        sed -i "s|repository:.*|repository: $CI_REGISTRY_IMAGE|g" values.yaml
        sed -i "s|tag:.*|tag: $CI_COMMIT_SHA|g" values.yaml

        # 打包chart
        helm package . --version $CI_COMMIT_TAG --app-version $CI_COMMIT_SHA
        helm repo index .
      elif [ -d "charts/" ]; then
        for chart in charts/*/; do
          if [ -f "$chart/Chart.yaml" ]; then
            helm package "$chart" --version $CI_COMMIT_TAG --app-version $CI_COMMIT_SHA
          fi
        done
        helm repo index .
      else
        echo "未找到Helm chart"
      fi
  artifacts:
    paths:
      - *.tgz
      - index.yaml
    expire_in: 1 month
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_TAG

# 第六阶段: 部署到开发环境
deploy-dev:
  stage: deploy-dev
  image: bitnami/kubectl:$KUBECTL_VERSION
  environment:
    name: development
    url: https://dev.example.com
  before_script:
    - echo "$KUBE_CONFIG_DEV" > kubeconfig.yaml
    - export KUBECONFIG=kubeconfig.yaml
  script:
    - echo "部署到开发环境..."
    # 使用Kustomize部署
    - |
      if [ -f "kustomization.yaml" ] || [ -f "kustomization.yml" ]; then
        kubectl apply -k overlays/dev/
      elif [ -f "Chart.yaml" ]; then
        helm upgrade --install myapp . -n $K8S_NAMESPACE_DEV --values values-dev.yaml
      else
        kubectl apply -f manifests/ -n $K8S_NAMESPACE_DEV
      fi

    # 等待部署完成
    - kubectl rollout status deployment/myapp -n $K8S_NAMESPACE_DEV --timeout=300s

    # 运行冒烟测试
    - |
      POD_NAME=$(kubectl get pods -n $K8S_NAMESPACE_DEV -l app=myapp -o jsonpath='{.items[0].metadata.name}')
      kubectl exec -n $K8S_NAMESPACE_DEV $POD_NAME -- curl -f http://localhost:8080/health || echo "健康检查失败"
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
      when: manual

# 第七阶段: 部署到预生产环境
deploy-staging:
  stage: deploy-staging
  image: bitnami/kubectl:$KUBECTL_VERSION
  environment:
    name: staging
    url: https://staging.example.com
  dependencies:
    - deploy-dev
  before_script:
    - echo "$KUBE_CONFIG_STAGING" > kubeconfig.yaml
    - export KUBECONFIG=kubeconfig.yaml
  script:
    - echo "部署到预生产环境..."
    # 部署策略选择
    - |
      case $DEPLOYMENT_STRATEGY in
        "rolling")
          echo "使用滚动更新策略"
          kubectl apply -f manifests/ -n $K8S_NAMESPACE_STAGING
          ;;
        "blue-green")
          echo "使用蓝绿部署策略"
          # 创建绿色部署
          sed "s|name: myapp-deployment|name: myapp-deployment-green|g" manifests/deployment.yaml > deployment-green.yaml
          kubectl apply -f deployment-green.yaml -n $K8S_NAMESPACE_STAGING
          kubectl rollout status deployment/myapp-deployment-green -n $K8S_NAMESPACE_STAGING

          # 切换服务
          kubectl patch service myapp-service -n $K8S_NAMESPACE_STAGING -p '{"spec":{"selector":{"deployment":"green"}}}'
          sleep 30

          # 清理蓝色部署
          kubectl delete deployment myapp-deployment -n $K8S_NAMESPACE_STAGING || true
          ;;
        "canary")
          echo "使用金丝雀发布策略"
          # 创建金丝雀部署 (10%流量)
          sed "s|replicas: 3|replicas: 1|g" manifests/deployment.yaml > deployment-canary.yaml
          sed -i "s|name: myapp-deployment|name: myapp-deployment-canary|g" deployment-canary.yaml
          kubectl apply -f deployment-canary.yaml -n $K8S_NAMESPACE_STAGING
          ;;
      esac

    # 运行集成测试
    - |
      echo "运行集成测试..."
      # 获取服务地址
      SERVICE_IP=$(kubectl get svc myapp-service -n $K8S_NAMESPACE_STAGING -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
      if [ -n "$SERVICE_IP" ]; then
        curl -f http://$SERVICE_IP:8080/health && echo "集成测试通过"
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
      when: manual

# 第八阶段: 部署到生产环境
deploy-prod:
  stage: deploy-prod
  image: bitnami/kubectl:$KUBECTL_VERSION
  environment:
    name: production
    url: https://example.com
  dependencies:
    - deploy-staging
  before_script:
    - echo "$KUBE_CONFIG_PROD" > kubeconfig.yaml
    - export KUBECONFIG=kubeconfig.yaml
  script:
    - echo "部署到生产环境..."
    # 生产环境部署需要审批
    - |
      case $DEPLOYMENT_STRATEGY in
        "rolling")
          echo "使用滚动更新策略部署到生产"
          kubectl apply -f manifests/ -n $K8S_NAMESPACE_PROD
          kubectl rollout status deployment/myapp -n $K8S_NAMESPACE_PROD --timeout=600s
          ;;
        "blue-green")
          echo "使用蓝绿部署策略部署到生产"
          # 蓝色环境已经运行，部署绿色环境
          sed "s|name: myapp-deployment|name: myapp-deployment-green|g" manifests/deployment.yaml > deployment-green.yaml
          kubectl apply -f deployment-green.yaml -n $K8S_NAMESPACE_PROD
          kubectl rollout status deployment/myapp-deployment-green -n $K8S_NAMESPACE_PROD --timeout=600s

          # 逐步切换流量
          echo "逐步切换流量..."
          for weight in 10 25 50 75 100; do
            echo "切换 $weight% 流量到绿色环境"
            # 这里需要配置服务网格 (如Istio) 进行流量切换
            sleep 30
          done

          # 清理蓝色环境
          kubectl delete deployment myapp-deployment -n $K8S_NAMESPACE_PROD
          ;;
      esac

    # 验证部署
    - |
      echo "验证生产部署..."
      kubectl get pods -n $K8S_NAMESPACE_PROD
      kubectl get svc -n $K8S_NAMESPACE_PROD

      # 运行生产环境健康检查
      SERVICE_IP=$(kubectl get svc myapp-service -n $K8S_NAMESPACE_PROD -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
      if [ -n "$SERVICE_IP" ]; then
        for i in {1..10}; do
          curl -f http://$SERVICE_IP:8080/health && break || sleep 10
        done
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: false
    - if: $CI_COMMIT_TAG
      when: manual
      allow_failure: false

# 第九阶段: 监控和告警
monitor-deployment:
  stage: monitor
  image: curlimages/curl:latest
  environment:
    name: monitoring
  dependencies:
    - deploy-prod
  script:
    - echo "设置监控和告警..."
    # 部署Prometheus监控规则
    - |
      if [ -f "monitoring/prometheus-rules.yaml" ]; then
        kubectl apply -f monitoring/prometheus-rules.yaml -n monitoring
      fi

    # 部署Grafana仪表板
    - |
      if [ -f "monitoring/grafana-dashboard.yaml" ]; then
        kubectl apply -f monitoring/grafana-dashboard.yaml -n monitoring
      fi

    # 发送部署通知
    - |
      if [ -n "$SLACK_WEBHOOK_URL" ]; then
        curl -X POST -H 'Content-type: application/json' \
          --data "{\"text\":\"🚀 部署完成: $CI_PROJECT_NAME $CI_COMMIT_TAG 已成功部署到生产环境\"}" \
          $SLACK_WEBHOOK_URL
      fi

    # 检查部署健康状态
    - |
      echo "检查部署健康状态..."
      # 等待一段时间后检查
      sleep 60
      # 这里可以添加更复杂的健康检查逻辑
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: always
    - if: $CI_COMMIT_TAG
      when: always

# 第十阶段: 自动回滚 (失败时)
auto-rollback:
  stage: .post
  image: bitnami/kubectl:$KUBECTL_VERSION
  when: on_failure
  script:
    - echo "检测到部署失败，执行自动回滚..."
    - |
      if [ -n "$KUBE_CONFIG_PROD" ]; then
        echo "$KUBE_CONFIG_PROD" > kubeconfig.yaml
        export KUBECONFIG=kubeconfig.yaml

        # 回滚到上一个版本
        kubectl rollout undo deployment/myapp -n $K8S_NAMESPACE_PROD
        kubectl rollout status deployment/myapp -n $K8S_NAMESPACE_PROD

        # 发送回滚通知
        if [ -n "$SLACK_WEBHOOK_URL" ]; then
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"⚠️ 自动回滚: $CI_PROJECT_NAME 部署失败，已回滚到上一个版本\"}" \
            $SLACK_WEBHOOK_URL
        fi
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# 清理阶段
cleanup:
  stage: .post
  image: alpine:latest
  script:
    - echo "清理临时文件..."
    - rm -rf kubeconfig.yaml *.tgz
  when: always

# 集成GitLab安全模板
include:
  - template: Security/Container-Scanning.gitlab-ci.yml
  - template: Security/Cluster-Image-Scanning.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

# 性能优化配置
cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - .cache/helm/
    - .cache/kubectl/
  policy: pull-push

# 资源限制
resource_group: kubernetes-deployment
interruptible: true
timeout: 2 hours