# GitLab CI/CD配置文件模板 - Node.js项目
# 支持npm/yarn、多阶段管道、容器化部署

# 定义工作流规则
workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"
      when: always
    - if: $CI_COMMIT_TAG
      when: always
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always
    - when: never

# 定义全局变量
variables:
  NODE_VERSION: "18"
  DOCKER_IMAGE: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
  TEST_REPORTS_DIR: "test-results"
  COVERAGE_REPORTS_DIR: "coverage-reports"

  # 自动检测包管理器
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"
  YARN_CACHE_FOLDER: "$CI_PROJECT_DIR/.yarn-cache"

# 全局缓存配置
cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - node_modules/
    - .npm/
    - .yarn-cache/
  policy: pull-push

# 定义管道阶段
stages:
  - install
  - lint
  - test
  - build
  - security
  - deploy

# 第一阶段: 安装依赖
install-dependencies:
  stage: install
  image: node:$NODE_VERSION
  before_script:
    - node --version
    - npm --version || echo "npm未安装"
    - yarn --version || echo "yarn未安装"
  script:
    - echo "安装依赖..."
    # 检测包管理器并安装依赖
    - |
      if [ -f "package-lock.json" ]; then
        echo "使用npm安装依赖"
        npm ci --cache .npm --prefer-offline
      elif [ -f "yarn.lock" ]; then
        echo "使用yarn安装依赖"
        yarn install --frozen-lockfile --cache-folder .yarn-cache
      elif [ -f "package.json" ]; then
        echo "使用npm安装依赖"
        npm install --cache .npm --prefer-offline
      else
        echo "未找到package.json"
        exit 1
      fi
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"

# 第二阶段: 代码质量检查
lint-javascript:
  stage: lint
  image: node:$NODE_VERSION
  dependencies:
    - install-dependencies
  script:
    - echo "运行代码质量检查..."
    # ESLint检查
    - |
      if [ -f "node_modules/.bin/eslint" ]; then
        npx eslint . --ext .js,.jsx,.ts,.tsx --format json --output-file eslint-report.json || true
      else
        echo "ESLint未安装，跳过检查"
      fi
    # TypeScript类型检查
    - |
      if [ -f "tsconfig.json" ] && [ -f "node_modules/.bin/tsc" ]; then
        npx tsc --noEmit || true
      fi
    # Prettier格式化检查
    - |
      if [ -f "node_modules/.bin/prettier" ]; then
        npx prettier --check . || true
      fi
  artifacts:
    reports:
      codequality:
        - gl-code-quality-report.json
    paths:
      - eslint-report.json
    when: always
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"

# 第三阶段: 测试
test-javascript:
  stage: test
  image: node:$NODE_VERSION
  dependencies:
    - install-dependencies
  parallel:
    matrix:
      - NODE_VERSION: ["16", "18", "20"]
  script:
    - echo "运行JavaScript测试..."
    # 检测测试框架并运行测试
    - |
      if [ -f "node_modules/.bin/jest" ]; then
        echo "使用Jest运行测试"
        npx jest --coverage --coverageReporters=lcov,text,html --reporters=jest-junit --ci --maxWorkers=2
        # 移动测试报告
        mkdir -p $TEST_REPORTS_DIR
        cp junit.xml $TEST_REPORTS_DIR/ || true
      elif [ -f "node_modules/.bin/mocha" ]; then
        echo "使用Mocha运行测试"
        npx mocha --reporter json --reporter-option output=$TEST_REPORTS_DIR/mocha.json || true
      elif [ -f "package.json" ] && grep -q '"test"' package.json; then
        echo "运行npm test"
        npm test || true
      else
        echo "未找到测试配置"
      fi
  artifacts:
    reports:
      junit:
        - $TEST_REPORTS_DIR/junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage/lcov.info
    paths:
      - coverage/
      - $TEST_REPORTS_DIR/
    when: always
    expire_in: 1 week
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"

# E2E测试 (需要Docker)
e2e-tests:
  stage: test
  image: cypress/included:12.0.0
  services:
    - postgres:14-alpine
    - redis:7-alpine
  variables:
    POSTGRES_DB: test_db
    POSTGRES_USER: test_user
    POSTGRES_PASSWORD: test_password
    REDIS_URL: redis://redis:6379
  dependencies:
    - install-dependencies
  script:
    - echo "运行E2E测试..."
    # 启动应用
    - npm start &
    - sleep 10
    # 运行Cypress测试
    - npx cypress run --record false --browser chrome
  artifacts:
    paths:
      - cypress/videos/
      - cypress/screenshots/
    when: always
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
    - if: $CI_COMMIT_BRANCH == "develop"
      when: manual

# 第四阶段: 构建
build-application:
  stage: build
  image: node:$NODE_VERSION
  dependencies:
    - test-javascript
  script:
    - echo "构建应用..."
    # 检测构建脚本
    - |
      if [ -f "package.json" ] && grep -q '"build"' package.json; then
        echo "运行npm build"
        npm run build
      elif [ -f "webpack.config.js" ] || [ -f "vite.config.js" ]; then
        echo "检测到构建配置，运行默认构建"
        npx webpack --mode production || npx vite build || echo "构建失败"
      else
        echo "未找到构建配置"
      fi
  artifacts:
    paths:
      - dist/
      - build/
      - public/
    expire_in: 1 month
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# Docker镜像构建
build-docker:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  dependencies:
    - build-application
  before_script:
    - docker info
  script:
    - echo "构建Docker镜像..."
    - docker build -t $DOCKER_IMAGE .
    - docker push $DOCKER_IMAGE
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
  only:
    variables:
      - $BUILD_DOCKER == "true"

# 第五阶段: 安全扫描
security-scan:
  stage: security
  image: node:$NODE_VERSION
  dependencies: []
  before_script:
    - npm install -g npm-audit-retire.js snyk
  script:
    - echo "运行安全扫描..."
    # npm安全审计
    - npm audit --json > npm-audit-report.json || true
    # 依赖漏洞扫描
    - npx retire --outputformat json --outputpath retirejs-report.json || true
    # Snyk安全扫描 (需要SNYK_TOKEN环境变量)
    - |
      if [ -n "$SNYK_TOKEN" ]; then
        npx snyk test --json > snyk-report.json || true
      else
        echo "SNYK_TOKEN未设置，跳过Snyk扫描"
      fi
  artifacts:
    reports:
      sast:
        - gl-sast-report.json
    paths:
      - npm-audit-report.json
      - retirejs-report.json
      - snyk-report.json
    when: always
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# 第六阶段: 部署
deploy-staging:
  stage: deploy
  image: alpine:latest
  environment:
    name: staging
    url: https://staging.example.com
  dependencies:
    - build-application
    - security-scan
  before_script:
    - apk add --no-cache curl
  script:
    - echo "部署到预生产环境..."
    # 这里添加实际的部署命令
    # 例如: 部署到Vercel、Netlify、S3等
    - |
      if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ]; then
        echo "部署到Vercel"
        npx vercel --token $VERCEL_TOKEN --prod
      elif [ -n "$NETLIFY_AUTH_TOKEN" ] && [ -n "$NETLIFY_SITE_ID" ]; then
        echo "部署到Netlify"
        npx netlify deploy --prod --dir=dist
      else
        echo "未配置部署凭据，跳过部署"
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
      when: manual

deploy-production:
  stage: deploy
  image: alpine:latest
  environment:
    name: production
    url: https://example.com
  dependencies:
    - deploy-staging
  before_script:
    - apk add --no-cache curl kubectl
  script:
    - echo "部署到生产环境..."
    # Kubernetes部署示例
    - |
      if [ -f "deployment.yaml" ] && [ -n "$KUBE_CONFIG" ]; then
        echo "$KUBE_CONFIG" > kubeconfig.yaml
        export KUBECONFIG=kubeconfig.yaml
        kubectl apply -f deployment.yaml
        kubectl rollout status deployment/app -n production
      else
        echo "未配置Kubernetes部署"
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
    - if: $CI_COMMIT_TAG
      when: manual

# 性能测试
performance-test:
  stage: deploy
  image: node:$NODE_VERSION
  environment:
    name: performance
  dependencies:
    - deploy-staging
  script:
    - echo "运行性能测试..."
    # 安装和运行k6性能测试
    - |
      if [ -f "k6-script.js" ]; then
        npx k6 run k6-script.js --out json=performance.json
      else
        echo "未找到k6测试脚本"
      fi
  artifacts:
    reports:
      performance:
        - performance.json
    when: always
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual

# 清理阶段
cleanup:
  stage: .post
  image: alpine:latest
  script:
    - echo "清理临时文件..."
    - rm -rf node_modules/ .npm/ .yarn-cache/ coverage/ test-results/
  when: always
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"

# 集成GitLab安全模板
include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Dependency-Scanning.gitlab-ci.yml
  - template: Security/Container-Scanning.gitlab-ci.yml
  - template: Security/License-Scanning.gitlab-ci.yml

# 性能优化配置
performance:
  reports:
    browser_performance:
      - performance.json
    load_performance:
      - load.json

# 质量门禁
quality_gates:
  test_coverage:
    minimum: 80
  security_vulnerabilities:
    maximum: 0