# JUnit Platform配置
# 用于JUnit 5测试执行

# 启用详细日志
junit.jupiter.execution.parallel.enabled = true
junit.jupiter.execution.parallel.mode.default = concurrent
junit.jupiter.execution.parallel.mode.classes.default = concurrent

# 配置并行执行策略
junit.jupiter.execution.parallel.config.strategy = dynamic
junit.jupiter.execution.parallel.config.dynamic.factor = 1.0

# 测试发现配置
junit.jupiter.testclass.order.default = org.junit.jupiter.api.ClassOrderer$ClassName
junit.jupiter.testmethod.order.default = org.junit.jupiter.api.MethodOrderer$MethodName

# 显示名称生成器
junit.jupiter.displayname.generator.default = org.junit.jupiter.api.DisplayNameGenerator$ReplaceUnderscores

# 生命周期配置
junit.jupiter.testinstance.lifecycle.default = per_method

# 扩展自动检测
junit.jupiter.extensions.autodetection.enabled = true

# 测试超时配置
junit.jupiter.execution.timeout.default = 5m

# 禁用测试条件
junit.jupiter.conditions.deactivate = org.junit.*DisabledCondition

# 报告配置
junit.platform.output.capture.stdout = true
junit.platform.output.capture.stderr = true

# 启用测试模板调用上下文
junit.jupiter.testtemplate.invocation.context.caching.enabled = true

# 测试方法参数自动转换
junit.jupiter.arguments.aggregation.enabled = true

# 配置测试类过滤器 (可选)
# junit.jupiter.testclass.includes = **/*Test.class
# junit.jupiter.testclass.excludes = **/*IT.class

# 配置测试方法过滤器 (可选)
# junit.jupiter.testmethod.includes = **Test#*test*
# junit.jupiter.testmethod.excludes = **Test#*slow*