# Serverless Framework配置模板
# 支持多云部署: AWS Lambda, Azure Functions, Google Cloud Functions

# Serverless Framework版本
frameworkVersion: '3'

# 服务配置
service: ${env:APP_NAME, 'myapp'}

# 插件配置
plugins:
  - serverless-webpack
  - serverless-offline
  - serverless-dotenv-plugin
  - serverless-prune-plugin
  - serverless-iam-roles-per-function

# 自定义配置
custom:
  # 环境配置
  env: ${env:NODE_ENV, 'development'}
  region: ${env:AWS_REGION, 'us-east-1'}
  stage: ${opt:stage, 'dev'}

  # Webpack配置
  webpack:
    webpackConfig: 'webpack.config.js'
    includeModules:
      forceExclude:
        - aws-sdk

  # API Gateway配置
  apiGateway:
    restApiId: ${env:API_GATEWAY_ID, ''}
    restApiRootResourceId: ${env:API_GATEWAY_ROOT_RESOURCE_ID, ''}

  # 自定义域名
  customDomain:
    domainName: ${env:API_DOMAIN, 'api.example.com'}
    basePath: ''
    stage: ${self:custom.stage}
    createRoute53Record: true
    endpointType: 'regional'
    securityPolicy: 'tls_1_2'

  # 环境变量映射
  environment:
    NODE_ENV: ${self:custom.env}
    STAGE: ${self:custom.stage}
    REGION: ${self:custom.region}
    SERVICE_NAME: ${self:service}
    LOG_LEVEL: ${env:LOG_LEVEL, 'info'}
    # 从.env文件注入的其他环境变量
    DATABASE_URL: ${env:DATABASE_URL}
    REDIS_URL: ${env:REDIS_URL}
    JWT_SECRET: ${env:JWT_SECRET}
    API_KEY: ${env:API_KEY}

  # 日志保留配置
  logs:
    restApi: true
    websocket: true
    httpApi: true
    lambda: true

  # 扩展配置
  prune:
    automatic: true
    number: 3

  # 警报配置
  alerts:
    dashboards: true
    topics:
      alarm: ${env:SNS_ALARM_TOPIC, 'alarm-topic'}
      ok: ${env:SNS_OK_TOPIC, 'ok-topic'}
    definitions:
      functionErrors:
        threshold: 1
        period: 60
        evaluationPeriods: 1
        comparisonOperator: GreaterThanThreshold
        treatMissingData: notBreaching
      functionDuration:
        threshold: 5000
        period: 60
        evaluationPeriods: 1
        comparisonOperator: GreaterThanThreshold

# 提供商配置 (多云支持)
provider:
  name: ${env:PROVIDER, 'aws'}
  # AWS配置
  aws:
    profile: ${env:AWS_PROFILE, 'default'}
    region: ${self:custom.region}
    stage: ${self:custom.stage}
    runtime: ${env:RUNTIME, 'nodejs18.x'}
    architecture: ${env:ARCHITECTURE, 'arm64'}
    memorySize: ${env:MEMORY_SIZE, 256}
    timeout: ${env:TIMEOUT, 30}
    versionFunctions: false
    deploymentBucket:
      name: ${env:DEPLOYMENT_BUCKET, ''}
      serverSideEncryption: 'AES256'
    iam:
      role:
        statements:
          - Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
            Resource: arn:aws:logs:*:*:*
          - Effect: Allow
            Action:
              - dynamodb:Query
              - dynamodb:Scan
              - dynamodb:GetItem
              - dynamodb:PutItem
              - dynamodb:UpdateItem
              - dynamodb:DeleteItem
            Resource: ${env:DYNAMODB_ARN, 'arn:aws:dynamodb:*:*:table/*'}
          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
            Resource: ${env:S3_ARN, 'arn:aws:s3:::*/${self:service}/*'}
          - Effect: Allow
            Action:
              - sqs:SendMessage
              - sqs:ReceiveMessage
              - sqs:DeleteMessage
            Resource: ${env:SQS_ARN, 'arn:aws:sqs:*:*:*'}
          - Effect: Allow
            Action:
              - sns:Publish
            Resource: ${env:SNS_ARN, 'arn:aws:sns:*:*:*'}
          - Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
            Resource: ${env:SECRETS_MANAGER_ARN, 'arn:aws:secretsmanager:*:*:secret:*'}

  # Azure配置
  azure:
    subscriptionId: ${env:AZURE_SUBSCRIPTION_ID}
    resourceGroup: ${env:AZURE_RESOURCE_GROUP, 'serverless-rg'}
    location: ${env:AZURE_LOCATION, 'eastus'}
    runtime: ${env:AZURE_RUNTIME, 'node'}
    os: 'linux'
    prefix: ${self:service}

  # Google Cloud配置
  google:
    project: ${env:GOOGLE_PROJECT_ID}
    region: ${env:GOOGLE_REGION, 'us-central1'}
    runtime: ${env:GOOGLE_RUNTIME, 'nodejs18'}
    memorySize: ${env:MEMORY_SIZE, 256}
    credentials: ${env:GOOGLE_APPLICATION_CREDENTIALS}

# 包配置
package:
  individually: true
  exclude:
    - .git/**
    - .gitignore
    - .env
    - .env.example
    - README.md
    - docker-compose.yml
    - Dockerfile
    - node_modules/**
    - coverage/**
    - .serverless/**
    - .webpack/**
    - tests/**
    - __tests__/**
    - '*.test.js'
    - '*.spec.js'
  include:
    - src/**
    - package.json
    - package-lock.json

# 函数定义
functions:
  # HTTP API函数
  api:
    handler: src/handlers/api.handler
    description: 'Main API Gateway handler'
    events:
      - httpApi:
          path: /{proxy+}
          method: any
          cors:
            origin: ${env:CORS_ORIGIN, '*'}
            headers:
              - Content-Type
              - Authorization
              - X-API-Key
            allowCredentials: false
            maxAge: 86400
    environment:
      HANDLER_TYPE: 'api'
    iamRoleStatements:
      - Effect: Allow
        Action:
          - xray:PutTraceSegments
          - xray:PutTelemetryRecords
        Resource: '*'
    tags:
      Type: 'API'
      Environment: ${self:custom.stage}

  # 健康检查函数
  health:
    handler: src/handlers/health.handler
    description: 'Health check endpoint'
    events:
      - httpApi:
          path: /health
          method: get
    environment:
      HANDLER_TYPE: 'health'
    memorySize: 128
    timeout: 10
    tags:
      Type: 'Health'
      Environment: ${self:custom.stage}

  # 用户认证函数
  auth:
    handler: src/handlers/auth.handler
    description: 'Authentication handler'
    events:
      - httpApi:
          path: /auth/{action}
          method: post
    environment:
      HANDLER_TYPE: 'auth'
      JWT_SECRET: ${env:JWT_SECRET}
      JWT_EXPIRES_IN: ${env:JWT_EXPIRES_IN, '1h'}
    tags:
      Type: 'Auth'
      Environment: ${self:custom.stage}

  # 文件上传函数
  upload:
    handler: src/handlers/upload.handler
    description: 'File upload handler'
    events:
      - httpApi:
          path: /upload
          method: post
    environment:
      HANDLER_TYPE: 'upload'
      S3_BUCKET: ${env:S3_BUCKET}
      MAX_FILE_SIZE: ${env:MAX_FILE_SIZE, '5242880'}
    memorySize: 512
    ephemeralStorageSize: 512
    timeout: 60
    tags:
      Type: 'Upload'
      Environment: ${self:custom.stage}

  # 计划任务函数 (Cron)
  scheduledTask:
    handler: src/handlers/scheduled.handler
    description: 'Scheduled task runner'
    events:
      - schedule:
          rate: rate(5 minutes)
          enabled: ${self:custom.stage} == 'prod'
          input:
            task: 'cleanup'
    environment:
      HANDLER_TYPE: 'scheduled'
    tags:
      Type: 'Scheduled'
      Environment: ${self:custom.stage}

  # 队列处理函数 (SQS)
  queueProcessor:
    handler: src/handlers/queue.handler
    description: 'SQS queue message processor'
    events:
      - sqs:
          arn: ${env:SQS_QUEUE_ARN}
          batchSize: 10
          maximumBatchingWindow: 30
          functionResponseType: 'ReportBatchItemFailures'
    environment:
      HANDLER_TYPE: 'queue'
    memorySize: 512
    timeout: 300
    tags:
      Type: 'Queue'
      Environment: ${self:custom.stage}

  # WebSocket连接处理函数
  websocket:
    handler: src/handlers/websocket.handler
    description: 'WebSocket connection handler'
    events:
      - websocket:
          route: $connect
      - websocket:
          route: $disconnect
      - websocket:
          route: $default
    environment:
      HANDLER_TYPE: 'websocket'
    tags:
      Type: 'WebSocket'
      Environment: ${self:custom.stage}

  # GraphQL API函数
  graphql:
    handler: src/handlers/graphql.handler
    description: 'GraphQL API handler'
    events:
      - httpApi:
          path: /graphql
          method: post
      - httpApi:
          path: /graphql
          method: get
    environment:
      HANDLER_TYPE: 'graphql'
    memorySize: 512
    timeout: 30
    tags:
      Type: 'GraphQL'
      Environment: ${self:custom.stage}

# 资源定义 (CloudFormation/ARM/Terraform)
resources:
  # DynamoDB表
  Resources:
    UsersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-users-${self:custom.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: userId
            AttributeType: S
          - AttributeName: email
            AttributeType: S
        KeySchema:
          - AttributeName: userId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: EmailIndex
            KeySchema:
              - AttributeName: email
                KeyType: HASH
            Projection:
              ProjectionType: ALL
        StreamSpecification:
          StreamViewType: NEW_AND_OLD_IMAGES
        SSESpecification:
          SSEEnabled: true
        Tags:
          - Key: Service
            Value: ${self:service}
          - Key: Environment
            Value: ${self:custom.stage}

    SessionsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-sessions-${self:custom.stage}
        BillingMode: PAY_PER_REQUEST
        TimeToLiveSpecification:
          AttributeName: expiresAt
        AttributeDefinitions:
          - AttributeName: sessionId
            AttributeType: S
        KeySchema:
          - AttributeName: sessionId
            KeyType: HASH
        Tags:
          - Key: Service
            Value: ${self:service}
          - Key: Environment
            Value: ${self:custom.stage}

    # S3存储桶
    StorageBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:service}-storage-${self:custom.stage}
        VersioningConfiguration:
          Status: Enabled
        LifecycleConfiguration:
          Rules:
            - Id: DeleteOldVersions
              Status: Enabled
              NoncurrentVersionExpirationInDays: 30
            - Id: DeleteIncompleteUploads
              Status: Enabled
              AbortIncompleteMultipartUpload:
                DaysAfterInitiation: 7
        BucketEncryption:
          ServerSideEncryptionConfiguration:
            - ServerSideEncryptionByDefault:
                SSEAlgorithm: AES256
        PublicAccessBlockConfiguration:
          BlockPublicAcls: true
          BlockPublicPolicy: true
          IgnorePublicAcls: true
          RestrictPublicBuckets: true
        Tags:
          - Key: Service
            Value: ${self:service}
          - Key: Environment
            Value: ${self:custom.stage}

    # SQS队列
    ProcessingQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-processing-${self:custom.stage}
        VisibilityTimeout: 300
        MessageRetentionPeriod: 1209600  # 14天
        RedrivePolicy:
          deadLetterTargetArn: !GetAtt DeadLetterQueue.Arn
          maxReceiveCount: 3
        Tags:
          - Key: Service
            Value: ${self:service}
          - Key: Environment
            Value: ${self:custom.stage}

    DeadLetterQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-dlq-${self:custom.stage}
        MessageRetentionPeriod: 1209600  # 14天
        Tags:
          - Key: Service
            Value: ${self:service}
          - Key: Environment
            Value: ${self:custom.stage}

  # 输出定义
  Outputs:
    ServiceEndpoint:
      Description: 'API Gateway endpoint URL'
      Value: !Join ['', ['https://', !Ref ApiGatewayRestApi, '.execute-api.', !Ref 'AWS::Region', '.amazonaws.com/', !Ref 'AWS::StackName']]

    StorageBucketName:
      Description: 'S3 storage bucket name'
      Value: !Ref StorageBucket

    UsersTableName:
      Description: 'DynamoDB users table name'
      Value: !Ref UsersTable

    ProcessingQueueUrl:
      Description: 'SQS processing queue URL'
      Value: !Ref ProcessingQueue

# 部署配置
deployment:
  stages:
    dev:
      region: us-east-1
      profile: default
      tags:
        Environment: dev
        Owner: dev-team
    staging:
      region: us-east-1
      profile: staging
      tags:
        Environment: staging
        Owner: staging-team
    prod:
      region: us-east-1
      profile: prod
      tags:
        Environment: prod
        Owner: prod-team
      alerts:
        enabled: true

# 使用说明:
# 1. 安装Serverless Framework: npm install -g serverless
# 2. 配置云提供商凭据
# 3. 安装依赖: npm install
# 4. 本地测试: serverless offline
# 5. 部署到开发环境: serverless deploy --stage dev
# 6. 部署到生产环境: serverless deploy --stage prod
# 7. 查看部署信息: serverless info --stage prod
# 8. 查看日志: serverless logs --function api --stage prod

# 环境变量配置:
# 创建.env文件并设置以下变量:
# APP_NAME=myapp
# AWS_PROFILE=default
# AWS_REGION=us-east-1
# NODE_ENV=development
# DATABASE_URL=postgresql://user:pass@host:port/db
# REDIS_URL=redis://host:port
# JWT_SECRET=your-secret-key
# API_KEY=your-api-key
# CORS_ORIGIN=https://example.com

# 最佳实践:
# 1. 使用环境变量存储敏感信息
# 2. 为每个环境使用独立的部署阶段
# 3. 配置适当的IAM权限
# 4. 启用X-Ray跟踪进行性能监控
# 5. 设置警报和监控
# 6. 使用DLQ处理失败的消息
# 7. 定期清理旧部署版本
# 8. 启用加密和数据保护
# 9. 配置适当的超时和内存设置
# 10. 使用标签进行资源管理和成本分配

# 多云部署说明:
# 要切换到其他云提供商，修改provider.name:
# - AWS: provider.name: aws
# - Azure: provider.name: azure
# - Google Cloud: provider.name: google
# 并配置相应的环境变量和插件

# 故障排除:
# 1. 权限问题: 检查IAM角色和策略
# 2. 超时问题: 增加timeout值或优化函数逻辑
# 3. 内存不足: 增加memorySize值
# 4. 部署失败: 检查网络连接和凭据
# 5. 本地测试: 使用serverless-offline插件