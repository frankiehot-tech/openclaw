experiments:
  coding_plan_deepseek_coder_ab:
    data_collection:
      additional_fields:
      - experiment_group
      - task_hash
      - quality_score
      - success
      - execution_time
      enabled: true
      storage_backend: cost_tracker
    description: 评估DeepSeek Coder在coding_plan任务上的质量表现 - 实验已完成，结论：DeepSeek在相同质量下成本降低87.9%
    design:
      groups:
      - allocation: 0.5
        model: qwen3.5-plus
        name: control
        provider: dashscope
      - allocation: 0.5
        model: deepseek-coder
        name: treatment
        provider: deepseek
      randomization: hash_based
      salt: coding_plan_experiment_2026
      type: A/B测试
    enabled: false
    end_date: '2026-04-17'
    metrics:
    - description: 对比DeepSeek Coder和DashScope的成本差异
      formula: (dashscope_cost - deepseek_cost) / dashscope_cost
      name: 成本节省
    - description: 基于代码正确性、可读性、效率的综合评分
      name: 代码质量评分
      scale: 0-10
    - description: 任务成功完成的比率
      formula: successful_tasks / total_tasks
      name: 任务成功率
    - description: 任务执行时间对比
      name: 执行时间
      unit: seconds
    name: DeepSeek Coder vs DashScope 质量对比实验
    start_date: '2026-04-17'
    success_criteria:
      primary:
      - confidence: 95%
        metric: 成本节省
        threshold: '>70%'
      - confidence: 90%
        metric: 代码质量评分
        threshold: '>=7.5'
      secondary:
      - metric: 任务成功率
        threshold: '>=85%'
      - metric: 执行时间
        threshold: increase < 20%
  deepseek_migration_phase1:
    data_collection:
      additional_fields:
      - migration_phase
      - migration_group
      - quality_score
      - error_details
      - execution_time
      enabled: true
      storage_backend: cost_tracker
    description: 基于迁移决策报告，分阶段迁移coding_plan任务到DeepSeek，第一阶段10%流量
    design:
      groups:
      - allocation: 0.9
        model: qwen3.5-plus
        name: original
        provider: dashscope
      - allocation: 0.1
        model: deepseek-coder
        name: migrated
        provider: deepseek
      randomization: hash_based
      salt: deepseek_migration_phase1_2026
      type: 迁移实验
    enabled: true
    end_date: '2026-05-01'
    metrics:
    - description: 迁移部分的成本节省效果
      formula: (dashscope_cost - deepseek_cost) / dashscope_cost
      name: 成本节省
      target: '>70%'
    - description: 迁移部分的质量保持情况
      name: 质量一致性
      scale: 0-1
      target: '>=0.9'
    - description: 迁移组和原组的错误率差异
      formula: migrated_error_rate - original_error_rate
      name: 错误率对比
      target: increase < 0.02
    name: DeepSeek分阶段迁移 - 第一阶段 (10%)
    start_date: '2026-04-17'
    success_criteria:
      primary:
      - confidence: 90%
        metric: 成本节省
        threshold: '>70%'
      - confidence: 90%
        metric: 质量一致性
        threshold: '>=0.9'
      secondary:
      - metric: 错误率对比
        threshold: increase < 0.02
      - metric: 用户满意度
        threshold: no negative feedback
feature_flags:
  enable_cost_aware_routing:
    description: 启用成本感知路由
    enabled: false
    rollout_percentage: 0.0
  enable_experiment_framework:
    description: 启用实验框架
    enabled: true
  enable_quality_scoring:
    description: 启用代码质量自动评分
    enabled: false
global_settings:
  default_allocation: 0.5
  experiment_data_dir: /tmp/athena_experiments
  max_experiments: 10
  require_approval: false
updated_at: '2026-04-17'
version: '1.0'
