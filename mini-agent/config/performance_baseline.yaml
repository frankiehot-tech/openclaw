# 验证指令 (Validation Instructions)
validation_instructions:
  - description: "运行性能基线测试"
    command: "python scripts/test_performance_smoke.py"
    expected_output: "性能监控冒烟测试通过"
    
  - description: "生成性能摘要报告"
    command: "python scripts/performance_summary.py --no-export"
    expected_output: "性能摘要 Markdown 输出"
    
  - description: "检查当前性能指标"
    command: "python scripts/performance_monitor.py"
    expected_output: "性能监控仪表板输出"
    
  - description: "验证负载均衡"
    command: "python scripts/test_parallel_build_gate.py"
    expected_output: "并行构建门测试通过"

